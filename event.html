<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eka Danar Arrasyid — Event / Organization</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font: "Roboto", system-ui, sans-serif; --heading-font: "Raleway", sans-serif; --nav-font: "Poppins", sans-serif;
      --background-color: #ffffff; --default-color: #272829; --heading-color: #45505b; --accent-color: #0563bb;
      --surface-color: #ffffff; --contrast-color: #ffffff; --nav-color: #45505b; --nav-hover-color: #0563bb; --nav-active-bg: #0563bb;
      --sidebar-width: 72px; --sidebar-bg: #f8f9fa; --sidebar-border: #e9ecef; --nav-btn-size: 46px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--default-font); background-color: var(--background-color); color: var(--default-color); min-height: 100vh; display: flex; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }

    #sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; align-items: center; padding: 28px 0; gap: 10px; z-index: 1000; }
    .nav-btn { width: var(--nav-btn-size); height: var(--nav-btn-size); border-radius: 50%; background: transparent; color: var(--nav-color); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.25s, color 0.25s, transform 0.2s; text-decoration: none; position: relative; }
    .nav-btn:hover { background: rgba(5,99,187,0.1); color: var(--nav-hover-color); transform: scale(1.08); }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--contrast-color); box-shadow: 0 4px 14px rgba(5,99,187,0.35); }
    .nav-btn::after { content: attr(data-tooltip); position: absolute; left: calc(100% + 14px); top: 50%; transform: translateY(-50%); background: var(--heading-color); color: #fff; padding: 5px 11px; border-radius: 6px; font-family: var(--nav-font); font-size: 12px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn::before { content: ''; position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%); border: 5px solid transparent; border-right-color: var(--heading-color); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn:hover::after, .nav-btn:hover::before { opacity: 1; }

    #main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 60px 80px; }

    .page-header { margin-bottom: 32px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.1s forwards; }
    .page-title { font-family: var(--heading-font); font-size: clamp(32px,4vw,52px); font-weight: 700; color: var(--heading-color); margin-bottom: 6px; }
    .page-title span { color: var(--accent-color); }
    .page-subtitle { font-family: var(--nav-font); font-size: 14px; color: var(--default-color); opacity: 0.5; }

    /* Filter Tabs */
    .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; opacity: 0; transform: translateY(14px); animation: fadeUp 0.6s ease 0.22s forwards; }
    .filter-tab { font-family: var(--nav-font); font-size: 12px; font-weight: 600; padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--sidebar-border); background: transparent; color: var(--heading-color); cursor: pointer; transition: all 0.2s; }
    .filter-tab:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(5,99,187,0.04); }
    .filter-tab.active { background: var(--accent-color); border-color: var(--accent-color); color: #fff; box-shadow: 0 4px 12px rgba(5,99,187,0.25); }

    /* Grid */
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

    .event-card { background: var(--surface-color); border: 1px solid var(--sidebar-border); border-radius: 16px; overflow: hidden; opacity: 0; transform: translateY(28px); transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s; }
    .event-card:hover { box-shadow: 0 8px 28px rgba(5,99,187,0.09); transform: translateY(-4px); border-color: rgba(5,99,187,0.15); }

    .event-img-wrap { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #eaf1fb, #d0e4f7); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .event-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .event-card:hover .event-img-wrap img { transform: scale(1.04); }

    .event-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 100%; }
    .placeholder-icon-wrap { width: 56px; height: 56px; border-radius: 14px; background: rgba(5,99,187,0.1); display: flex; align-items: center; justify-content: center; }
    .placeholder-icon-wrap i { font-size: 24px; color: var(--accent-color); opacity: 0.4; }
    .placeholder-text { font-family: var(--nav-font); font-size: 11px; color: var(--accent-color); opacity: 0.4; }

    .event-body { padding: 20px 22px 22px; }

    .event-type-badge { display: inline-flex; align-items: center; gap: 6px; font-family: var(--nav-font); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 11px; border-radius: 20px; margin-bottom: 12px; }
    .badge-org   { background: rgba(5,99,187,0.09);  color: var(--accent-color); }
    .badge-event { background: rgba(13,155,121,0.1); color: #0a8f71; }
    .badge-comp  { background: rgba(194,97,12,0.09); color: #b5590a; }

    .event-name { font-family: var(--heading-font); font-size: 15px; font-weight: 700; color: var(--heading-color); margin-bottom: 4px; line-height: 1.35; }
    .event-role { font-family: var(--nav-font); font-size: 12px; font-weight: 600; color: var(--accent-color); margin-bottom: 10px; }
    .event-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .event-meta-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--default-color); opacity: 0.55; }
    .event-meta-item i { font-size: 10px; color: var(--accent-color); opacity: 0.65; }
    .event-desc { font-size: 13px; line-height: 1.68; color: var(--default-color); opacity: 0.72; }

    .state-box { text-align: center; padding: 60px 24px; color: var(--heading-color); opacity: 0.45; }
    .state-box i { font-size: 36px; margin-bottom: 12px; display: block; }
    .state-box p { font-family: var(--nav-font); font-size: 13px; }
    .spin { animation: spinAnim 0.8s linear infinite; }
    @keyframes spinAnim { to { transform: rotate(360deg); } }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }
      #sidebar { width: 100%; height: 62px; flex-direction: row; justify-content: center; top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--sidebar-border); padding: 0 16px; gap: 8px; }
      .nav-btn::after, .nav-btn::before { display: none; }
      #main-content { margin-left: 0; margin-bottom: 62px; padding: 40px 28px; }
    }
    @media (max-width: 560px) { .event-grid { grid-template-columns: 1fr; } #main-content { padding: 32px 20px; } }
  </style>
</head>
<body>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil"><i class="fas fa-user"></i></a>
    <a href="skills.html"        class="nav-btn" data-tooltip="Skills"><i class="fas fa-list-check"></i></a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience"><i class="fas fa-briefcase"></i></a>
    <a href="event.html"         class="nav-btn active" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification"><i class="fas fa-award"></i></a>
  </nav>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Event / <span>Organization</span></h1>
      <p class="page-subtitle">Kegiatan & organisasi yang diikuti</p>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">Semua</button>
      <button class="filter-tab" data-filter="org">Organisasi</button>
      <button class="filter-tab" data-filter="event">Event</button>
      <button class="filter-tab" data-filter="comp">Kompetisi</button>
    </div>

    <div class="event-grid" id="eventGrid">
      <div class="state-box" style="grid-column:1/-1"><i class="fas fa-circle-notch spin"></i><p>Memuat data...</p></div>
    </div>
  </main>

  <script type="module">
    import { supabase, fetchData } from './supabase.js';

    const typeLabel = { org: 'Organisasi', event: 'Event', comp: 'Kompetisi' };
    const typeBadge = { org: 'badge-org',  event: 'badge-event', comp: 'badge-comp' };
    const typeIcon  = { org: 'fas fa-users', event: 'fas fa-calendar-check', comp: 'fas fa-trophy' };

    let allData = [];

    async function loadEvents() {
      const grid = document.getElementById('eventGrid');

      const { data, error } = await supabase
        .from('events')
        .select('*')
        .order('sort_order');

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data event.</p></div>`;
        return;
      }

      allData = data;
      renderCards(data);
    }

    function renderCards(data) {
      const grid = document.getElementById('eventGrid');

      if (data.length === 0) {
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fas fa-calendar-days"></i><p>Tidak ada data.</p></div>`;
        return;
      }

      let delay = 0.3;
      grid.innerHTML = data.map(e => {
        const imgHtml = e.image_url
          ? `<img src="${e.image_url}" alt="${e.name}" loading="lazy">`
          : `<div class="event-img-placeholder">
               <div class="placeholder-icon-wrap"><i class="fas fa-image"></i></div>
               <span class="placeholder-text">Foto Kegiatan</span>
             </div>`;

        const d = delay;
        delay += 0.1;

        return `
          <div class="event-card" style="animation: fadeUp 0.55s ease ${d}s forwards;" data-type="${e.type}">
            <div class="event-img-wrap">${imgHtml}</div>
            <div class="event-body">
              <span class="event-type-badge ${typeBadge[e.type]}">
                <i class="${typeIcon[e.type]}"></i> ${typeLabel[e.type]}
              </span>
              <p class="event-name">${e.name}</p>
              <p class="event-role">${e.role || ''}</p>
              <div class="event-meta">
                ${e.period   ? `<span class="event-meta-item"><i class="fas fa-calendar"></i> ${e.period}</span>` : ''}
                ${e.location ? `<span class="event-meta-item"><i class="fas fa-location-dot"></i> ${e.location}</span>` : ''}
              </div>
              <p class="event-desc">${e.description || ''}</p>
            </div>
          </div>`;
      }).join('');
    }

    // Filter
    document.getElementById('filterTabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;
      renderCards(filter === 'all' ? allData : allData.filter(d => d.type === filter));
    });

    loadEvents();
  </script>
</body>
</html>
