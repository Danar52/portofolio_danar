<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="./assets/Title HTML.jpg"/>
  <title>Eka Danar Arrasyid — Skills</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font:  "Roboto", system-ui, sans-serif;
      --heading-font:  "Raleway", sans-serif;
      --nav-font:      "Poppins", sans-serif;
      --background-color: #ffffff;
      --default-color:    #272829;
      --heading-color:    #45505b;
      --accent-color:     #0563bb;
      --surface-color:    #ffffff;
      --contrast-color:   #ffffff;
      --nav-color:        #45505b;
      --nav-hover-color:  #0563bb;
      --nav-active-bg:    #0563bb;
      --sidebar-width:    72px;
      --sidebar-bg:       #f8f9fa;
      --sidebar-border:   #e9ecef;
      --nav-btn-size:     46px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--default-font); background-color: var(--background-color); color: var(--default-color); min-height: 100vh; display: flex; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* SIDEBAR */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-width); height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column;
      align-items: center; padding: 28px 0; gap: 10px; z-index: 1000;
    }

    .nav-btn {
      width: var(--nav-btn-size); height: var(--nav-btn-size);
      border-radius: 50%; background: transparent;
      color: var(--nav-color); font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.25s, color 0.25s, transform 0.2s;
      text-decoration: none; position: relative;
    }

    .nav-btn:hover { background: rgba(5,99,187,0.1); color: var(--nav-hover-color); transform: scale(1.08); }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--contrast-color); box-shadow: 0 4px 14px rgba(5,99,187,0.35); }

    .nav-btn::after {
      content: attr(data-tooltip);
      position: absolute; left: calc(100% + 14px); top: 50%; transform: translateY(-50%);
      background: var(--heading-color); color: #fff;
      padding: 5px 11px; border-radius: 6px;
      font-family: var(--nav-font); font-size: 12px; font-weight: 500;
      white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .nav-btn::before {
      content: ''; position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-right-color: var(--heading-color);
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .nav-btn:hover::after, .nav-btn:hover::before { opacity: 1; }

    /* MAIN */
    #main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 60px 80px; }

    .page-header { margin-bottom: 48px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.1s forwards; }
    .page-title { font-family: var(--heading-font); font-size: clamp(32px,4vw,52px); font-weight: 700; color: var(--heading-color); margin-bottom: 6px; }
    .page-title span { color: var(--accent-color); }
    .page-subtitle { font-family: var(--nav-font); font-size: 14px; color: var(--default-color); opacity: 0.5; }

    /* SKILLS LAYOUT */
    .skills-wrapper { display: flex; flex-direction: column; gap: 40px; }

    /* CATEGORY SECTION */
    .skill-section {
      opacity: 0;
      transform: translateY(24px);
    }

    .skill-section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .skill-section-title {
      font-family: var(--heading-font);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .skill-section-line {
      flex: 1;
      height: 1px;
      background: var(--sidebar-border);
    }

    .skill-section-count {
      font-family: var(--nav-font);
      font-size: 11px;
      color: var(--default-color);
      opacity: 0.35;
    }

    /* SKILLS GRID INSIDE CATEGORY */
    .skills-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px 28px;
    }

    /* SKILL ITEM */
    .skill-item { }

    .skill-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
    }

    .skill-name {
      font-family: var(--nav-font);
      font-size: 13px;
      font-weight: 500;
      color: var(--default-color);
    }

    .skill-pct {
      font-family: var(--nav-font);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-color);
      opacity: 0.7;
    }

    .skill-bar-track {
      height: 4px;
      background: var(--sidebar-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .skill-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-color), #4a9eff);
      width: 0%;
      transition: width 1.1s cubic-bezier(0.4,0,0.2,1);
    }

    /* Loading & Error */
    .state-box { text-align: center; padding: 60px 24px; color: var(--heading-color); opacity: 0.45; }
    .state-box i { font-size: 36px; margin-bottom: 12px; display: block; }
    .state-box p { font-family: var(--nav-font); font-size: 13px; }
    .spin { animation: spinAnim 0.8s linear infinite; }
    @keyframes spinAnim { to { transform: rotate(360deg); } }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* ── HAMBURGER BUTTON ─────────────────────────────────────── */
#hamburger {
  display: none; /* hidden di desktop */
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 1100;
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--accent-color);
  border: none;
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 10px;
  box-shadow: 0 4px 16px rgba(5, 99, 187, 0.30);
  transition: background 0.2s, transform 0.2s;
}
#hamburger:hover {
  background: #0452a0;
  transform: scale(1.05);
}
#hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
  transform-origin: center;
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
              opacity   0.2s ease,
              width     0.2s ease;
}
 
/* Hamburger → X saat open */
#hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
#hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
#hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
 
 
/* ── BACKDROP OVERLAY ─────────────────────────────────────── */
#nav-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(39, 40, 41, 0.45);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  opacity: 0;
  transition: opacity 0.28s ease;
}
#nav-backdrop.visible {
  opacity: 1;
}
 
 
/* ── RESPONSIVE — MOBILE ──────────────────────────────────── */
@media (max-width: 768px) {

  /* Chibi — tetap tampilan lama */
  .home-hero {
    grid-template-columns: 1fr;
    padding: 72px 24px 32px; /* ← ganti padding biar clearance hamburger */
    justify-items: center;
    text-align: center;
  }
  .hero-text   { align-items: center; }
  .chibi-stage { width: 100%; height: 360px; overflow: hidden; }
  .chibi-img   { height: 340px; max-height: 340px; min-height: 340px; }
 
  /* Hamburger button muncul */
  #hamburger {
    display: flex;
  }
 
  /* Backdrop aktif saat sidebar open */
  #nav-backdrop {
    display: block;
  }
 
  /* Reset sidebar width — tidak ada reserved space di kiri */
  :root {
    --sidebar-width: 0px;
  }
 
  /* Sidebar: pindah ke luar viewport kiri, slide masuk saat open */
  #sidebar {
    /* Override semua layout desktop */
    position: fixed;
    top: 0;
    left: 0;
    width: 220px;
    height: 100vh;
    flex-direction: column;
    align-items: flex-start;
    padding: 80px 16px 32px;
    gap: 6px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    border-top: none;
 
    /* Tersembunyi di kiri, slide masuk saat .open */
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.32s ease;
    box-shadow: none;
    z-index: 1000;
  }
 
  #sidebar.open {
    transform: translateX(0);
    box-shadow: 6px 0 32px rgba(5, 99, 187, 0.14);
  }
 
  /* Nav button di mobile: lebar penuh, rounded, dengan label teks */
  #sidebar .nav-btn {
    width: 100%;
    height: 46px;
    border-radius: 10px;
    justify-content: flex-start;
    padding: 0 14px;
    gap: 12px;
    font-size: 15px;
  }
 
  /* Tampilkan label tooltip sebagai teks inline di mobile */
  #sidebar .nav-btn::after {
    /* Override tooltip positioning — jadikan inline text */
    position: static;
    transform: none;
    background: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: 13px;
    font-weight: 500;
    opacity: 1;
    pointer-events: auto;
    content: attr(data-tooltip);
    white-space: nowrap;
  }
 
  /* Sembunyikan arrow tooltip */
  #sidebar .nav-btn::before {
    display: none;
  }
 
  /* Main content tidak perlu margin bottom lagi */
  #main-content {
    margin-left: 0;
    margin-bottom: 0;
  }
 
  /* Padding hero di mobile */
  .home-hero {
    padding: 72px 24px 32px; /* top lebih tinggi untuk clearance hamburger */
  }
}
  </style>
</head>
<body>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil"><i class="fas fa-user"></i></a>
    <a href="skills.html"        class="nav-btn active" data-tooltip="Skills"><i class="fas fa-list-check"></i></a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience"><i class="fas fa-briefcase"></i></a>
    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification"><i class="fas fa-award"></i></a>
    <a href="portfolio.html" class="nav-btn" data-tooltip="Portfolio">
  <i class="fas fa-briefcase-clock"></i>
</a>
  </nav>

  <button id="hamburger" aria-label="Menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div id="nav-backdrop"></div>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Ski<span>lls</span></h1>
      <p class="page-subtitle">Kemampuan teknis & non-teknis</p>
    </div>
    <div class="skills-wrapper" id="skillsWrapper">
      <div class="state-box"><i class="fas fa-circle-notch spin"></i><p>Memuat data...</p></div>
    </div>
  </main>

  <script type="module">
    import { supabase } from './supabase.js';

    async function loadSkills() {
      const wrapper = document.getElementById('skillsWrapper');

      const { data, error } = await supabase
        .from('skills')
        .select('*')
        .order('category')
        .order('sort_order');

      if (error || !data || data.length === 0) {
        wrapper.innerHTML = `<div class="state-box"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data skills.</p></div>`;
        return;
      }

      // Group by category
      const groups = {};
      data.forEach(s => {
        if (!groups[s.category]) groups[s.category] = [];
        groups[s.category].push(s);
      });

      let html = '';
      let delay = 0.15;

      for (const [cat, items] of Object.entries(groups)) {
        html += `
          <div class="skill-section" style="animation: fadeUp 0.55s ease ${delay}s forwards;">
            <div class="skill-section-header">
              <span class="skill-section-title">${cat}</span>
              <div class="skill-section-line"></div>
              <span class="skill-section-count">${items.length} skills</span>
            </div>
            <div class="skills-list">
              ${items.map(s => `
                <div class="skill-item">
                  <div class="skill-meta">
                    <span class="skill-name">${s.skill_name}</span>
                    <span class="skill-pct">${s.percentage}%</span>
                  </div>
                  <div class="skill-bar-track">
                    <div class="skill-bar-fill" data-pct="${s.percentage}"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
        delay += 0.1;
      }

      wrapper.innerHTML = html;

      // Animate bars setelah render
      setTimeout(() => {
        document.querySelectorAll('.skill-bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }, 350);
    }

    loadSkills();
  </script>
  <script type="module" src="chatbot.js"></script>
  <script>
(function() {
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');
  const backdrop  = document.getElementById('nav-backdrop');
  if (!hamburger || !sidebar || !backdrop) return;

  function openMenu() {
    sidebar.classList.add('open');
    backdrop.classList.add('visible');
    hamburger.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    sidebar.classList.remove('open');
    backdrop.classList.remove('visible');
    hamburger.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  hamburger.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeMenu() : openMenu();
  });

  backdrop.addEventListener('click', closeMenu);

  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) closeMenu();
  });
})();
</script>
</body>
</html>
