<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eka Danar Arrasyid — Skills</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font:  "Roboto", system-ui, sans-serif;
      --heading-font:  "Raleway", sans-serif;
      --nav-font:      "Poppins", sans-serif;
      --background-color: #ffffff;
      --default-color:    #272829;
      --heading-color:    #45505b;
      --accent-color:     #0563bb;
      --surface-color:    #ffffff;
      --contrast-color:   #ffffff;
      --nav-color:        #45505b;
      --nav-hover-color:  #0563bb;
      --nav-active-bg:    #0563bb;
      --sidebar-width:    72px;
      --sidebar-bg:       #f8f9fa;
      --sidebar-border:   #e9ecef;
      --nav-btn-size:     46px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--default-font); background-color: var(--background-color); color: var(--default-color); min-height: 100vh; display: flex; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* SIDEBAR */
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-width); height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column;
      align-items: center; padding: 28px 0; gap: 10px; z-index: 1000;
    }

    .nav-btn {
      width: var(--nav-btn-size); height: var(--nav-btn-size);
      border-radius: 50%; background: transparent;
      color: var(--nav-color); font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.25s, color 0.25s, transform 0.2s;
      text-decoration: none; position: relative;
    }

    .nav-btn:hover { background: rgba(5,99,187,0.1); color: var(--nav-hover-color); transform: scale(1.08); }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--contrast-color); box-shadow: 0 4px 14px rgba(5,99,187,0.35); }

    .nav-btn::after {
      content: attr(data-tooltip);
      position: absolute; left: calc(100% + 14px); top: 50%; transform: translateY(-50%);
      background: var(--heading-color); color: #fff;
      padding: 5px 11px; border-radius: 6px;
      font-family: var(--nav-font); font-size: 12px; font-weight: 500;
      white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .nav-btn::before {
      content: ''; position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-right-color: var(--heading-color);
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .nav-btn:hover::after, .nav-btn:hover::before { opacity: 1; }

    /* MAIN */
    #main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 60px 80px; }

    .page-header { margin-bottom: 48px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.1s forwards; }

    .page-title { font-family: var(--heading-font); font-size: clamp(32px,4vw,52px); font-weight: 700; color: var(--heading-color); margin-bottom: 6px; }
    .page-title span { color: var(--accent-color); }
    .page-subtitle { font-family: var(--nav-font); font-size: 14px; color: var(--default-color); opacity: 0.5; }

    /* SKILLS GRID */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 28px; }

    .skill-category {
      background: var(--surface-color); border: 1px solid var(--sidebar-border);
      border-radius: 16px; padding: 28px;
      opacity: 0; transform: translateY(28px);
      transition: box-shadow 0.25s;
    }

    .skill-category:hover { box-shadow: 0 8px 28px rgba(5,99,187,0.08); }

    .skill-category-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 26px; padding-bottom: 18px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .skill-cat-icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: rgba(5,99,187,0.08);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-color); font-size: 17px; flex-shrink: 0;
    }

    .skill-cat-title { font-family: var(--heading-font); font-size: 16px; font-weight: 700; color: var(--heading-color); }

    .skill-cat-count {
      margin-left: auto; font-family: var(--nav-font); font-size: 11px;
      font-weight: 600; color: var(--accent-color);
      background: rgba(5,99,187,0.08); padding: 3px 11px; border-radius: 20px;
    }

    .skill-item { margin-bottom: 18px; }
    .skill-item:last-child { margin-bottom: 0; }

    .skill-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

    .skill-name { font-family: var(--nav-font); font-size: 13px; font-weight: 500; color: var(--default-color); display: flex; align-items: center; gap: 8px; }
    .skill-name i { font-size: 14px; color: var(--accent-color); opacity: 0.65; width: 16px; text-align: center; }
    .skill-pct { font-family: var(--nav-font); font-size: 12px; font-weight: 700; color: var(--accent-color); }

    .skill-bar-track { height: 6px; background: var(--sidebar-bg); border-radius: 999px; overflow: hidden; }
    .skill-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-color), #4a9eff); width: 0%; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }

    /* Loading & Error */
    .state-box { text-align: center; padding: 60px 24px; color: var(--heading-color); opacity: 0.45; }
    .state-box i { font-size: 36px; margin-bottom: 12px; display: block; }
    .state-box p { font-family: var(--nav-font); font-size: 13px; }
    .spin { animation: spinAnim 0.8s linear infinite; }
    @keyframes spinAnim { to { transform: rotate(360deg); } }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }
      #sidebar { width: 100%; height: 62px; flex-direction: row; justify-content: center; top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--sidebar-border); padding: 0 16px; gap: 8px; }
      .nav-btn::after, .nav-btn::before { display: none; }
      #main-content { margin-left: 0; margin-bottom: 62px; padding: 40px 28px; }
    }

    @media (max-width: 560px) {
      .skills-grid { grid-template-columns: 1fr; }
      #main-content { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil"><i class="fas fa-user"></i></a>
    <a href="skills.html"        class="nav-btn active" data-tooltip="Skills"><i class="fas fa-list-check"></i></a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience"><i class="fas fa-briefcase"></i></a>
    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification"><i class="fas fa-award"></i></a>
  </nav>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Ski<span>lls</span></h1>
      <p class="page-subtitle">Kemampuan teknis & non-teknis</p>
    </div>
    <div class="skills-grid" id="skillsGrid">
      <div class="state-box"><i class="fas fa-circle-notch spin"></i><p>Memuat data...</p></div>
    </div>
  </main>

  <script type="module">
    import { supabase, fetchData } from './supabase.js';

    async function loadSkills() {
      const grid = document.getElementById('skillsGrid');

      const { data, error } = await db
        .from('skills')
        .select('*')
        .order('category')
        .order('sort_order');

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<div class="state-box"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data skills.</p></div>`;
        return;
      }

      // Group by category
      const groups = {};
      data.forEach(s => {
        if (!groups[s.category]) groups[s.category] = [];
        groups[s.category].push(s);
      });

      let html = '';
      let delay = 0.2;

      for (const [cat, items] of Object.entries(groups)) {
        html += `
          <div class="skill-category" style="animation: fadeUp 0.6s ease ${delay}s forwards;">
            <div class="skill-category-header">
              <div class="skill-cat-icon"><i class="${items[0].category_icon || 'fas fa-star'}"></i></div>
              <span class="skill-cat-title">${cat}</span>
              <span class="skill-cat-count">${items.length} Skills</span>
            </div>
            ${items.map(s => `
              <div class="skill-item">
                <div class="skill-meta">
                  <span class="skill-name">
                    <i class="${s.skill_icon || 'fas fa-circle-dot'}"></i>${s.skill_name}
                  </span>
                  <span class="skill-pct">${s.percentage}%</span>
                </div>
                <div class="skill-bar-track">
                  <div class="skill-bar-fill" data-pct="${s.percentage}"></div>
                </div>
              </div>
            `).join('')}
          </div>`;
        delay += 0.12;
      }

      grid.innerHTML = html;

      // Animate bars after render
      setTimeout(() => {
        document.querySelectorAll('.skill-bar-fill').forEach(bar => {
          bar.style.width = bar.dataset.pct + '%';
        });
      }, 400);
    }

    loadSkills();
  </script>
</body>
</html>
