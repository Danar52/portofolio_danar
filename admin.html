<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --accent:#0563bb; --accent-lt:rgba(5,99,187,0.08); --heading:#45505b; --text:#272829;
      --bg:#f4f7fb; --surface:#ffffff; --border:#e2e8f0; --sidebar-w:240px;
      --font:"Roboto",sans-serif; --font-nav:"Poppins",sans-serif; --font-h:"Raleway",sans-serif;
      --error:#e53e3e; --success:#38a169;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(5,99,187,0.2);border-radius:10px}

    #adminSidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
    .sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
    .brand-row{display:flex;align-items:center;gap:10px}
    .brand-icon{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .brand-name{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--heading)}
    .brand-role{font-family:var(--font-nav);font-size:10px;color:var(--text);opacity:.45}
    .sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-family:var(--font-nav);font-size:10px;font-weight:700;color:var(--text);opacity:.35;text-transform:uppercase;letter-spacing:1px;padding:10px 8px 6px}
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-family:var(--font-nav);font-size:13px;font-weight:500;color:var(--heading);text-decoration:none;cursor:pointer;transition:background .2s,color .2s;border:none;background:none;width:100%;text-align:left}
    .sidebar-link i{width:16px;text-align:center;font-size:14px;opacity:.65}
    .sidebar-link:hover{background:var(--accent-lt);color:var(--accent)}
    .sidebar-link:hover i,.sidebar-link.active i{opacity:1}
    .sidebar-link.active{background:var(--accent-lt);color:var(--accent);font-weight:600}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}

    #adminMain{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
    .topbar-title{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--heading)}
    .topbar-title span{color:var(--accent)}

    .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-family:var(--font-nav);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(5,99,187,.25)}
    .btn-primary:hover{background:#0452a3;box-shadow:0 5px 16px rgba(5,99,187,.35);transform:translateY(-1px)}
    .btn-outline{background:transparent;color:var(--heading);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
    .btn-danger{background:rgba(229,62,62,.08);color:var(--error);border:1.5px solid rgba(229,62,62,.2)}
    .btn-danger:hover{background:var(--error);color:#fff;border-color:var(--error)}
    .btn-sm{padding:6px 12px;font-size:11px}

    .content{padding:32px;flex:1}
    .page{display:none} .page.active{display:block}

    #toast{position:fixed;bottom:28px;right:28px;background:var(--heading);color:#fff;padding:14px 20px;border-radius:12px;font-family:var(--font-nav);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:9999;transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s}
    #toast.show{transform:translateY(0);opacity:1} #toast.success{background:var(--success)} #toast.error{background:var(--error)}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:24px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .28s ease}
    @keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px 16px;border-bottom:1px solid var(--border)}
    .modal-title{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--heading)}
    .modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);color:var(--heading);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .2s}
    .modal-close:hover{background:var(--border)}
    .modal-body{padding:24px 28px}
    .modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}

    .form-group{margin-bottom:18px}
    .form-label{display:block;font-family:var(--font-nav);font-size:12px;font-weight:600;color:var(--heading);margin-bottom:7px}
    .form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s,box-shadow .2s}
    .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(5,99,187,.1)}
    .form-textarea{resize:vertical;min-height:90px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-hint{font-size:11px;color:var(--text);opacity:.45;margin-top:5px}

    .toggle-wrap{display:flex;align-items:center;gap:10px}
    .toggle{position:relative;width:40px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:999px;cursor:pointer;transition:background .2s}
    .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;left:3px;top:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .toggle input:checked+.toggle-slider{background:var(--accent)}
    .toggle input:checked+.toggle-slider::before{transform:translateX(18px)}
    .toggle-label{font-family:var(--font-nav);font-size:13px;font-weight:500;color:var(--heading)}

    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:var(--bg);border-bottom:1px solid var(--border)}
    th{padding:12px 16px;font-family:var(--font-nav);font-size:11px;font-weight:700;color:var(--heading);text-transform:uppercase;letter-spacing:.6px;text-align:left;white-space:nowrap}
    td{padding:13px 16px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none} tr:hover td{background:var(--accent-lt)}
    .td-actions{display:flex;gap:6px;align-items:center}

    .tbl-img{width:52px;height:40px;border-radius:7px;object-fit:cover;background:var(--bg);border:1px solid var(--border)}
    .tbl-img-placeholder{width:52px;height:40px;border-radius:7px;background:var(--bg);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--heading);opacity:.3}
    .tbl-pdf{width:52px;height:40px;border-radius:7px;background:rgba(229,62,62,.07);border:1px solid rgba(229,62,62,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none}
    .tbl-pdf i{font-size:14px;color:#e53e3e} .tbl-pdf span{font-family:var(--font-nav);font-size:9px;font-weight:700;color:#e53e3e}

    .badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-nav);font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
    .badge-aktif{background:rgba(56,161,105,.1);color:#2f855a} .badge-selesai{background:rgba(69,80,91,.08);color:var(--heading)}
    .badge-org{background:rgba(5,99,187,.09);color:var(--accent)} .badge-event{background:rgba(13,155,121,.1);color:#0a8f71} .badge-comp{background:rgba(194,97,12,.09);color:#b5590a}

    .pct-wrap{display:flex;align-items:center;gap:8px}
    .pct-bar{flex:1;height:5px;background:var(--border);border-radius:999px;overflow:hidden;min-width:60px}
    .pct-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4a9eff);border-radius:999px}
    .pct-num{font-family:var(--font-nav);font-size:11px;font-weight:700;color:var(--accent);min-width:30px}

    .empty-state{text-align:center;padding:48px 24px;color:var(--heading);opacity:.45}
    .empty-state i{font-size:36px;margin-bottom:12px;display:block}
    .empty-state p{font-family:var(--font-nav);font-size:13px}
    .loading{text-align:center;padding:40px;color:var(--accent)}
    .loading i{font-size:24px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .tags-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border:1.5px solid var(--border);border-radius:9px;cursor:text;min-height:44px;transition:border-color .2s,box-shadow .2s}
    .tags-input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(5,99,187,.1)}
    .tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-lt);color:var(--accent);border-radius:20px;padding:3px 10px;font-family:var(--font-nav);font-size:12px;font-weight:500}
    .tag-chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;padding:0;opacity:.7}
    .tags-input{border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text);flex:1;min-width:80px;background:transparent}

    .range-wrap{display:flex;align-items:center;gap:12px}
    .range-wrap input[type=range]{flex:1;accent-color:var(--accent);height:4px}
    .range-val{font-family:var(--font-nav);font-size:13px;font-weight:700;color:var(--accent);min-width:36px}

    /* ── File Upload ── */
    .file-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
    .file-upload-area:hover{border-color:var(--accent);background:var(--accent-lt)}
    .file-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .file-upload-area i{font-size:24px;color:var(--accent);opacity:.4;display:block;margin-bottom:8px}
    .file-upload-area p{font-family:var(--font-nav);font-size:12px;color:var(--heading);opacity:.5}
    .file-type-hint{font-family:var(--font-nav);font-size:10px;color:var(--accent);opacity:.6;margin-top:4px}

    /* ── Upload Progress ── */
    .upload-progress{display:none;align-items:center;gap:12px;padding:12px 14px;background:var(--accent-lt);border:1px solid rgba(5,99,187,.2);border-radius:9px;margin-top:10px}
    .upload-progress.show{display:flex}
    .upload-progress i{color:var(--accent);font-size:16px;animation:spin .8s linear infinite}
    .upload-progress span{font-family:var(--font-nav);font-size:12px;color:var(--accent);font-weight:500}

    /* ── Current file preview ── */
    .current-file-preview{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;margin-bottom:10px}
    .current-file-preview .file-icon{font-size:22px;flex-shrink:0}
    .current-file-preview .file-icon.img-icon{color:var(--accent)} .current-file-preview .file-icon.pdf-icon{color:#e53e3e}
    .current-file-preview .file-info{flex:1;min-width:0}
    .current-file-preview .file-name{font-family:var(--font-nav);font-size:12px;font-weight:600;color:var(--heading);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .current-file-preview .file-type-badge{font-family:var(--font-nav);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px}
    .current-file-preview .file-type-badge.img{background:rgba(5,99,187,.1);color:var(--accent)} .current-file-preview .file-type-badge.pdf{background:rgba(229,62,62,.1);color:#e53e3e}
    .current-file-preview a{color:var(--accent);font-size:12px;text-decoration:none;white-space:nowrap}

    /* ── Confirm ── */
    .confirm-modal{max-width:380px;padding:32px;text-align:center}
    .confirm-icon{width:56px;height:56px;border-radius:50%;background:rgba(229,62,62,.1);color:var(--error);font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .confirm-title{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--heading);margin-bottom:8px}
    .confirm-text{font-size:14px;color:var(--text);opacity:.65;margin-bottom:24px;line-height:1.6}
    .confirm-btns{display:flex;gap:10px;justify-content:center}

    @media(max-width:900px){:root{--sidebar-w:0px}#adminSidebar{transform:translateX(-240px);width:240px}#adminSidebar.open{transform:translateX(0)}#adminMain{margin-left:0}.topbar{padding:14px 20px}.content{padding:20px}}
    @media(max-width:560px){.form-row{grid-template-columns:1fr}.modal{border-radius:12px}}
  </style>
</head>
<body>

  <aside id="adminSidebar">

    <div class="sidebar-footer">
      <button class="sidebar-link" id="btnLogout"><i class="fas fa-right-from-bracket"></i> Logout</button>

  <div id="adminMain">
    <header class="topbar">
      <h1 class="topbar-title" id="topbarTitle">Manage <span>Skills</span></h1>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btnAddNew"><i class="fas fa-plus"></i> Tambah Baru</button>
      </div>
    </header>
    <div class="content">
      <div class="page active" id="page-skills"><div id="skillsContent"><div class="loading"><i class="fas fa-circle-notch"></i></div></div></div>
      <div class="page" id="page-experience"><div id="expContent"><div class="loading"><i class="fas fa-circle-notch"></i></div></div></div>
      <div class="page" id="page-events"><div id="eventsContent"><div class="loading"><i class="fas fa-circle-notch"></i></div></div></div>
      <div class="page" id="page-certifications"><div id="certContent"><div class="loading"><i class="fas fa-circle-notch"></i></div></div></div>
    </div>

  <div id="toast"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Form</h3>
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btnCancel">Batal</button>
        <button class="btn btn-primary" id="btnSave"><i class="fas fa-floppy-disk"></i> Simpan</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal" style="max-width:360px">
      <div class="modal-body">
        <div class="confirm-modal">
          <div class="confirm-icon"><i class="fas fa-trash-can"></i></div>
          <p class="confirm-title">Hapus Data?</p>
          <p class="confirm-text" id="confirmText">Data yang dihapus tidak bisa dikembalikan.</p>
          <div class="confirm-btns">
            <button class="btn btn-outline" id="confirmCancel">Batal</button>
            <button class="btn btn-danger" id="confirmOk"><i class="fas fa-trash-can"></i> Hapus</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PDF.js untuk generate thumbnail -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://vdnysjewpqunxokscaan.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkbnlzamV3cHF1bnhva3NjYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjQ2MDcsImV4cCI6MjA4OTUwMDYwN30.GfnHPRuO8bDdfTJeOhLAV0gw54_PDGojQCrVPTzSA3g';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    db.auth.getSession().then(({ data }) => {
      if (!data.session) window.location.href = 'admin-login.html';
    });

    // ══════════════════════════════
    // HELPERS
    // ══════════════════════════════
    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.className = type;
      t.querySelector('i').className = `fas ${type==='success'?'fa-check-circle':'fa-circle-exclamation'}`;
      document.getElementById('toastText').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function openModal(title, bodyHTML, onSave) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHTML;
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('btnSave').onclick = onSave;
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function confirmDelete(msg, onConfirm) {
      document.getElementById('confirmText').textContent = msg;
      document.getElementById('confirmOverlay').classList.add('open');
      document.getElementById('confirmOk').onclick = () => {
        document.getElementById('confirmOverlay').classList.remove('open');
        onConfirm();
      };
    }

    document.getElementById('modalClose').onclick = closeModal;
    document.getElementById('btnCancel').onclick  = closeModal;
    document.getElementById('confirmCancel').onclick = () => document.getElementById('confirmOverlay').classList.remove('open');
    document.getElementById('modalOverlay').onclick  = e => { if (e.target===document.getElementById('modalOverlay')) closeModal(); };

    // ── Upload file ke Storage ──
    async function uploadFile(file, folder) {
      const ext  = file.name.split('.').pop().toLowerCase();
      const path = `${folder}/${Date.now()}.${ext}`;
      const { error } = await db.storage.from('portfolio-images').upload(path, file, { upsert: true });
      if (error) { showToast('Gagal upload: '+error.message, 'error'); return null; }
      return db.storage.from('portfolio-images').getPublicUrl(path).data.publicUrl;
    }

    // ── Generate thumbnail PNG dari halaman pertama PDF ──
    async function generatePDFThumbnail(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async e => {
          try {
            const pdf      = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
            const page     = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 2 });
            const canvas   = document.createElement('canvas');
            canvas.width   = viewport.width;
            canvas.height  = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            canvas.toBlob(resolve, 'image/png', 0.92);
          } catch(err) { reject(err); }
        };
        reader.readAsArrayBuffer(file);
      });
    }

    // ── Upload sertifikat (PDF atau gambar) + auto-thumbnail ──
    async function uploadCertFile(file, progressEl) {
      const isPDFFile = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
      const ts = Date.now();

      if (progressEl) { progressEl.classList.add('show'); progressEl.querySelector('span').textContent = isPDFFile ? 'Mengupload PDF...' : 'Mengupload gambar...'; }

      const fileUrl = await uploadFile(file, 'certs');
      if (!fileUrl) { if (progressEl) progressEl.classList.remove('show'); return null; }

      let thumbnailUrl = fileUrl; // Default untuk gambar

      if (isPDFFile) {
        if (progressEl) progressEl.querySelector('span').textContent = 'Membuat thumbnail dari PDF...';
        try {
          const blob = await generatePDFThumbnail(file);
          const thumbPath = `certs/thumb_${ts}.png`;
          const { error } = await db.storage.from('portfolio-images').upload(thumbPath, blob, { upsert: true, contentType: 'image/png' });
          thumbnailUrl = error ? null : db.storage.from('portfolio-images').getPublicUrl(thumbPath).data.publicUrl;
        } catch(err) {
          console.warn('Gagal buat thumbnail:', err);
          thumbnailUrl = null;
        }
      }

      if (progressEl) progressEl.classList.remove('show');
      return { fileUrl, thumbnailUrl };
    }

    function isPDF(url) { return url && url.toLowerCase().includes('.pdf'); }

      if (c.thumbnail_url) return `<img class="tbl-img" src="${c.thumbnail_url}" alt="thumb">`;

      if (c.image_url && isPDF(c.image_url))  return `<a href="${c.image_url}" target="_blank" class="tbl-pdf"><i class="fas fa-file-pdf"></i><span>PDF</span></a>`;
      return `<div class="tbl-img-placeholder"><i class="fas fa-certificate"></i></div>`;
    }

        <div class="form-group"><label class="form-label">Link Verifikasi <span style="opacity:.4">(opsional)</span></label>
          <input class="form-input" id="f_url" value="${data?.cert_url||''}" placeholder="https://..."/></div>
        <div class="form-group">
          <label class="form-label">Upload Sertifikat
            <span style="opacity:.4;font-weight:400"> — Foto atau PDF (thumbnail otomatis dibuat)</span>
          </label>
          ${renderCurrentFileInfo(data)}
          <div class="file-upload-area">
            <input type="file" id="f_cert_file" accept="image/*,.pdf"/>
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Klik untuk upload file sertifikat</p>
            <p class="file-type-hint">JPG, PNG, WEBP atau PDF · Thumbnail dari PDF dibuat otomatis</p>
          </div>
          <div class="upload-progress" id="uploadProgress">
            <i class="fas fa-circle-notch"></i>
            <span>Memproses file...</span>
          </div>
        </div>
      `, async () => {
        const btnSave = document.getElementById('btnSave');
        btnSave.disabled = true;
        btnSave.innerHTML = '<i class="fas fa-circle-notch" style="animation:spin .8s linear infinite"></i> Menyimpan...';

        let imageUrl     = data?.image_url     || null;
        let thumbnailUrl = data?.thumbnail_url || null;

        const file = document.getElementById('f_cert_file').files[0];
        if (file) {
          const progressEl = document.getElementById('uploadProgress');
          const result = await uploadCertFile(file, progressEl);
          if (!result) {
            btnSave.disabled = false;
            btnSave.innerHTML = '<i class="fas fa-floppy-disk"></i> Simpan';
            return;
          }
          imageUrl     = result.fileUrl;
          thumbnailUrl = result.thumbnailUrl;
        }

        const payload = {
          cert_name:     document.getElementById('f_name').value,
          issuer:        document.getElementById('f_issuer').value,
          issuer_icon:   document.getElementById('f_icon').value,
          issued_date:   document.getElementById('f_date').value,
          cert_url:      document.getElementById('f_url').value || null,
          image_url:     imageUrl,
          thumbnail_url: thumbnailUrl,
          sort_order:    parseInt(document.getElementById('f_sort').value)||0,
        };

        const {error} = isEdit
          ? await db.from('certifications').update(payload).eq('id',data.id)
          : await db.from('certifications').insert(payload);

        btnSave.disabled = false;
        btnSave.innerHTML = '<i class="fas fa-floppy-disk"></i> Simpan';

        if (error) { showToast('Gagal menyimpan: '+error.message,'error'); return; }
        closeModal();
        showToast(isEdit?'Sertifikat diperbarui!':'Sertifikat ditambahkan!');
        loadCertifications();
      });
    }

    async function deleteCert(id,name) {
      confirmDelete(`Hapus sertifikat "${name}"?`, async () => {
        const {error} = await db.from('certifications').delete().eq('id',id);
        if (error) { showToast('Gagal hapus','error'); return; }
        showToast('Sertifikat dihapus!'); loadCertifications();
      });
    }

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await db.auth.signOut();
      window.location.href = 'admin-login.html';
    });

    loadSkills();
  </script>
</body>
</html>
