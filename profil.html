<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eka Danar Arrasyid — Profil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font: "Roboto", system-ui, sans-serif; --heading-font: "Raleway", sans-serif; --nav-font: "Poppins", sans-serif;
      --background-color: #ffffff; --default-color: #272829; --heading-color: #45505b; --accent-color: #0563bb;
      --surface-color: #ffffff; --contrast-color: #ffffff; --nav-color: #45505b; --nav-hover-color: #0563bb; --nav-active-bg: #0563bb;
      --sidebar-width: 72px; --sidebar-bg: #f8f9fa; --sidebar-border: #e9ecef; --nav-btn-size: 46px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--default-font); background-color: var(--background-color); color: var(--default-color); min-height: 100vh; display: flex; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }

    #sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; align-items: center; padding: 28px 0; gap: 10px; z-index: 1000; }
    .nav-btn { width: var(--nav-btn-size); height: var(--nav-btn-size); border-radius: 50%; background: transparent; color: var(--nav-color); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.25s, color 0.25s, transform 0.2s; text-decoration: none; position: relative; }
    .nav-btn:hover { background: rgba(5,99,187,0.1); color: var(--nav-hover-color); transform: scale(1.08); }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--contrast-color); box-shadow: 0 4px 14px rgba(5,99,187,0.35); }
    .nav-btn::after { content: attr(data-tooltip); position: absolute; left: calc(100% + 14px); top: 50%; transform: translateY(-50%); background: var(--heading-color); color: #fff; padding: 5px 11px; border-radius: 6px; font-family: var(--nav-font); font-size: 12px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn::before { content: ''; position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%); border: 5px solid transparent; border-right-color: var(--heading-color); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn:hover::after, .nav-btn:hover::before { opacity: 1; }

    #main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 60px 80px; }

    .page-header { margin-bottom: 48px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.1s forwards; }
    .page-title { font-family: var(--heading-font); font-size: clamp(32px,4vw,52px); font-weight: 700; color: var(--heading-color); margin-bottom: 6px; }
    .page-title span { color: var(--accent-color); }
    .page-subtitle { font-family: var(--nav-font); font-size: 14px; color: var(--default-color); opacity: 0.5; }

    /* Layout */
    .profil-wrapper { display: grid; grid-template-columns: 240px 1fr; gap: 56px; align-items: start; }

    .profil-left { display: flex; flex-direction: column; align-items: center; gap: 24px; opacity: 0; transform: translateY(24px); animation: fadeUp 0.65s ease 0.25s forwards; }

    .profil-photo-wrap { position: relative; width: 180px; height: 180px; }
    .profil-photo-wrap::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid rgba(5,99,187,0.18); animation: ringPulse 2.8s ease-in-out infinite; }
    @keyframes ringPulse { 0%,100% { transform:scale(1); opacity:0.35; } 50% { transform:scale(1.05); opacity:0.85; } }

    .profil-photo { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-color); box-shadow: 0 8px 32px rgba(5,99,187,0.15); }

    .profil-photo-placeholder { width: 180px; height: 180px; border-radius: 50%; background: linear-gradient(135deg, #e8f0fb, #c5d8f5); border: 4px solid var(--accent-color); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 8px 32px rgba(5,99,187,0.15); }
    .profil-photo-placeholder .initials { font-family: var(--heading-font); font-size: 48px; font-weight: 800; color: var(--accent-color); line-height: 1; }
    .profil-photo-placeholder .photo-label { font-family: var(--nav-font); font-size: 10px; font-weight: 600; color: var(--accent-color); opacity: 0.6; letter-spacing: 1.5px; text-transform: uppercase; }

    .profil-socials { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .profil-social-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--sidebar-bg); border: 1px solid var(--sidebar-border); color: var(--heading-color); font-size: 14px; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: all 0.22s; }
    .profil-social-btn:hover { background: var(--accent-color); border-color: var(--accent-color); color: #fff; transform: translateY(-3px); box-shadow: 0 6px 14px rgba(5,99,187,0.28); }

    .profil-right { opacity: 0; transform: translateY(24px); animation: fadeUp 0.65s ease 0.38s forwards; }
    .profil-name { font-family: var(--heading-font); font-size: clamp(22px,3vw,34px); font-weight: 700; color: var(--heading-color); margin-bottom: 5px; }
    .profil-role { font-family: var(--nav-font); font-size: 13px; font-weight: 600; color: var(--accent-color); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 22px; }
    .profil-bio { font-size: 15px; line-height: 1.78; color: var(--default-color); opacity: 0.82; margin-bottom: 30px; padding-bottom: 28px; border-bottom: 1px solid var(--sidebar-border); }

    .profil-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; margin-bottom: 36px; }
    .profil-info-label { font-family: var(--nav-font); font-size: 10px; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
    .profil-info-value { font-size: 14px; font-weight: 500; color: var(--heading-color); }
    .profil-info-value a { color: var(--accent-color); text-decoration: none; }
    .profil-info-value a:hover { text-decoration: underline; }

    .section-label { font-family: var(--nav-font); font-size: 11px; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 18px; }

    .edu-timeline { position: relative; padding-left: 28px; }
    .edu-timeline::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, var(--accent-color), rgba(5,99,187,0.1)); }
    .edu-item { position: relative; padding-bottom: 26px; }
    .edu-item:last-child { padding-bottom: 0; }
    .edu-dot { position: absolute; left: -22px; top: 4px; width: 16px; height: 16px; border-radius: 50%; background: var(--accent-color); border: 3px solid #fff; box-shadow: 0 0 0 2px var(--accent-color); }
    .edu-dot.past { background: #b0bec5; box-shadow: 0 0 0 2px #b0bec5; }
    .edu-school { font-family: var(--heading-font); font-size: 15px; font-weight: 700; color: var(--heading-color); margin-bottom: 3px; }
    .edu-jurusan { font-size: 13px; color: var(--default-color); opacity: 0.7; margin-bottom: 6px; }
    .edu-tahun { display: inline-block; font-family: var(--nav-font); font-size: 11px; font-weight: 600; color: var(--accent-color); background: rgba(5,99,187,0.08); padding: 3px 12px; border-radius: 20px; }
    .edu-tahun.past { color: #6b7c8e; background: rgba(107,124,142,0.08); }

    .state-box { text-align: center; padding: 60px 24px; color: var(--heading-color); opacity: 0.45; }
    .state-box i { font-size: 36px; margin-bottom: 12px; display: block; }
    .spin { animation: spinAnim 0.8s linear infinite; }
    @keyframes spinAnim { to { transform: rotate(360deg); } }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 960px) { .profil-wrapper { grid-template-columns: 1fr; gap: 36px; } .profil-left { flex-direction: row; align-items: flex-start; flex-wrap: wrap; gap: 28px; } }
    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }
      #sidebar { width: 100%; height: 62px; flex-direction: row; justify-content: center; top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--sidebar-border); padding: 0 16px; gap: 8px; }
      .nav-btn::after, .nav-btn::before { display: none; }
      #main-content { margin-left: 0; margin-bottom: 62px; padding: 40px 28px; }
    }
    @media (max-width: 560px) { .profil-info-grid { grid-template-columns: 1fr; } #main-content { padding: 32px 20px; } }
  </style>
</head>
<body>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn active" data-tooltip="Profil"><i class="fas fa-user"></i></a>
    <a href="skills.html"        class="nav-btn" data-tooltip="Skills"><i class="fas fa-list-check"></i></a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience"><i class="fas fa-briefcase"></i></a>
    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification"><i class="fas fa-award"></i></a>
  </nav>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Pro<span>fil</span></h1>
      <p class="page-subtitle">Tentang saya</p>
    </div>
    <div id="profilContent">
      <div class="state-box"><i class="fas fa-circle-notch spin"></i></div>
    </div>
  </main>

  <script type="module">
    import { db } from './supabase.js';

    async function loadProfil() {
      const el = document.getElementById('profilContent');

      // Load profile + education parallel
      const [profRes, eduRes] = await Promise.all([
        db.from('profile').select('*').single(),
        db.from('education').select('*').order('sort_order')
      ]);

      if (profRes.error || !profRes.data) {
        el.innerHTML = `<div class="state-box"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data profil.</p></div>`;
        return;
      }

      const p = profRes.data;
      const eduList = eduRes.data || [];

      // Format date
      const birthDate = p.birth_date
        ? new Date(p.birth_date).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' })
        : '—';

      // Photo
      const photoHtml = p.photo_url
        ? `<img class="profil-photo" src="${p.photo_url}" alt="${p.full_name}">`
        : `<div class="profil-photo-placeholder">
             <span class="initials">${p.full_name.split(' ').map(n=>n[0]).slice(0,3).join('')}</span>
             <span class="photo-label">Photo</span>
           </div>`;

      // Social links
      const socials = [
        { url: p.url_x,         icon: 'fab fa-x-twitter',  title: 'X / Twitter' },
        { url: p.url_tiktok,    icon: 'fab fa-tiktok',     title: 'TikTok' },
        { url: p.url_instagram, icon: 'fab fa-instagram',  title: 'Instagram' },
        { url: p.url_linkedin,  icon: 'fab fa-linkedin-in',title: 'LinkedIn' },
        { url: p.url_github,    icon: 'fab fa-github',     title: 'GitHub' },
        { url: p.url_behance,   icon: 'fab fa-behance',    title: 'Behance' },
      ].filter(s => s.url);

      const socialsHtml = socials.map(s =>
        `<a href="${s.url}" target="_blank" class="profil-social-btn" title="${s.title}"><i class="${s.icon}"></i></a>`
      ).join('');

      // Education timeline
      const eduHtml = eduList.map(e => `
        <div class="edu-item">
          <div class="edu-dot ${e.is_active ? '' : 'past'}"></div>
          <p class="edu-school">${e.school_name}</p>
          <p class="edu-jurusan">${e.major || ''}</p>
          <span class="edu-tahun ${e.is_active ? '' : 'past'}">
            ${e.year_start} — ${e.is_active ? 'Sekarang' : (e.year_end || '')}
          </span>
        </div>
      `).join('');

      el.innerHTML = `
        <div class="profil-wrapper">
          <div class="profil-left">
            <div class="profil-photo-wrap">${photoHtml}</div>
            <div class="profil-socials">${socialsHtml}</div>
          </div>
          <div class="profil-right">
            <h2 class="profil-name">${p.full_name}</h2>
            <p class="profil-role">${p.role || ''}</p>
            <p class="profil-bio">${p.bio || ''}</p>
            <div class="profil-info-grid">
              <div><p class="profil-info-label">Tanggal Lahir</p><p class="profil-info-value">${birthDate}</p></div>
              <div><p class="profil-info-label">Domisili</p><p class="profil-info-value">${p.city || '—'}</p></div>
              <div><p class="profil-info-label">Email</p><p class="profil-info-value"><a href="mailto:${p.email}">${p.email || '—'}</a></p></div>
              <div><p class="profil-info-label">Status</p><p class="profil-info-value">Mahasiswa Aktif</p></div>
            </div>
            ${eduHtml ? `<p class="section-label">Riwayat Pendidikan</p><div class="edu-timeline">${eduHtml}</div>` : ''}
          </div>
        </div>`;
    }

    loadProfil();
  </script>
</body>
</html>
