<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eka Danar Arrasyid — Home</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* ===================== CSS VARIABLES ===================== */
    :root {
      --default-font:  "Roboto", system-ui, -apple-system, sans-serif;
      --heading-font:  "Raleway", sans-serif;
      --nav-font:      "Poppins", sans-serif;

      --background-color: #ffffff;
      --default-color:    #272829;
      --heading-color:    #45505b;
      --accent-color:     #0563bb;
      --surface-color:    #ffffff;
      --contrast-color:   #ffffff;

      --nav-color:       #45505b;
      --nav-hover-color: #0563bb;
      --nav-active-bg:   #0563bb;

      --sidebar-width:   72px;
      --sidebar-bg:      #f8f9fa;
      --sidebar-border:  #e9ecef;
      --nav-btn-size:    46px;
    }

    /* ===================== RESET ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--default-font);
      background-color: var(--background-color);
      color: var(--default-color);
      min-height: 100vh;
      display: flex;
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    /* ===================== SIDEBAR ===================== */
    #sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 0;
      gap: 10px;
      z-index: 1000;
    }

    .nav-btn {
      width: var(--nav-btn-size);
      height: var(--nav-btn-size);
      border-radius: 50%;
      background: transparent;
      color: var(--nav-color);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease;
      text-decoration: none;
      position: relative;
    }

    .nav-btn:hover {
      background: rgba(5,99,187,0.1);
      color: var(--nav-hover-color);
      transform: scale(1.08);
    }

    .nav-btn.active {
      background: var(--nav-active-bg);
      color: var(--contrast-color);
      box-shadow: 0 4px 14px rgba(5,99,187,0.35);
    }

    /* Tooltip */
    .nav-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 14px);
      top: 50%; transform: translateY(-50%);
      background: var(--heading-color);
      color: #fff;
      padding: 5px 11px;
      border-radius: 6px;
      font-family: var(--nav-font);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      left: calc(100% + 8px);
      top: 50%; transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: var(--heading-color);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .nav-btn:hover::after,
    .nav-btn:hover::before { opacity: 1; }

    /* ===================== MAIN CONTENT ===================== */
    #main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    /* ===================== HOME HERO ===================== */
    .home-hero {
      padding: 0 80px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    .home-hero::before {
      content: '';
      position: fixed;
      top: -150px; right: -150px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(5,99,187,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .home-hero::after {
      content: '';
      position: fixed;
      bottom: -80px; right: 80px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(5,99,187,0.03) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Name ── */
    .home-name {
      font-family: var(--heading-font);
      font-size: clamp(42px, 6vw, 78px);
      font-weight: 700;
      color: var(--heading-color);
      line-height: 1.08;
      letter-spacing: -1.5px;
      opacity: 0;
      transform: translateY(32px);
      animation: fadeUp 0.75s ease 0.15s forwards;
    }

    /* ── Tagline / Typewriter ── */
    .home-tagline {
      font-family: var(--default-font);
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 300;
      color: var(--default-color);
      margin-top: 18px;
      letter-spacing: 0.2px;
      opacity: 0;
      transform: translateY(22px);
      animation: fadeUp 0.75s ease 0.35s forwards;
    }

    .typewriter-text {
      color: var(--accent-color);
      font-weight: 500;
      border-right: 2.5px solid var(--accent-color);
      padding-right: 3px;
      animation: blink 0.75s step-end infinite;
    }

    @keyframes blink { 50% { border-color: transparent; } }

    /* ── Divider ── */
    .home-divider {
      width: 56px;
      height: 3px;
      background: var(--accent-color);
      border-radius: 2px;
      margin: 30px 0;
      opacity: 0;
      animation: fadeUp 0.75s ease 0.52s forwards;
    }

    /* ── Social Icons ── */
    .social-links {
      display: flex;
      gap: 20px;
      align-items: center;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.75s ease 0.68s forwards;
    }

    .social-link {
      color: var(--heading-color);
      font-size: 20px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .social-link:hover {
      color: var(--accent-color);
      transform: translateY(-3px);
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }

      #sidebar {
        width: 100%;
        height: 62px;
        flex-direction: row;
        justify-content: center;
        top: auto; bottom: 0;
        border-right: none;
        border-top: 1px solid var(--sidebar-border);
        padding: 0 16px;
        gap: 8px;
      }

      .nav-btn::after,
      .nav-btn::before { display: none; }

      #main-content { margin-left: 0; margin-bottom: 62px; }

      .home-hero { padding: 40px 32px; }
    }

    @media (max-width: 480px) {
      .home-hero { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- ======================== SIDEBAR ======================== -->
  <nav id="sidebar">
    <a href="index.html"         class="nav-btn active" data-tooltip="Home">
      <i class="fas fa-house"></i>
    </a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil">
      <i class="fas fa-user"></i>
    </a>
    <a href="skills.html"        class="nav-btn" data-tooltip="Skills">
      <i class="fas fa-list-check"></i>
    </a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience">
      <i class="fas fa-briefcase"></i>
    </a>
    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization">
      <i class="fas fa-calendar-days"></i>
    </a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification">
      <i class="fas fa-award"></i>
    </a>
  </nav>

  <!-- ======================== MAIN ======================== -->
  <main id="main-content">
    <div class="home-hero">

      <h1 class="home-name">Eka Danar Arrasyid</h1>

      <p class="home-tagline">
        We Are <span class="typewriter-text" id="typewriter"></span>
      </p>

      <div class="home-divider"></div>

      <div class="social-links">
        <a href="https://x.com/DanarrArrsyd"                  target="_blank" class="social-link" title="X / Twitter">
          <i class="fab fa-x-twitter"></i>
        </a>
        <a href="https://www.tiktok.com/@danararrsyd"          target="_blank" class="social-link" title="TikTok">
          <i class="fab fa-tiktok"></i>
        </a>
        <a href="https://www.instagram.com/danar_arrsyd/"      target="_blank" class="social-link" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://www.linkedin.com/in/ekadanararrasyid/" target="_blank" class="social-link" title="LinkedIn">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="https://github.com/Danar52"                   target="_blank" class="social-link" title="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://www.behance.net/ekadanararrasyid"     target="_blank" class="social-link" title="Behance">
          <i class="fab fa-behance"></i>
        </a>
      </div>

    </div>
  </main>

  <!-- ======================== JS ======================== -->
  <script>
    // ── Typewriter ──────────────────────────────────────────────
    const words    = ['Technicality', 'Developer', 'Designer', 'Creator', 'Engineer'];
    const el       = document.getElementById('typewriter');
    let wIdx = 0, cIdx = 0, deleting = false;

    function type() {
      const word = words[wIdx];
      if (!deleting) {
        el.textContent = word.slice(0, ++cIdx);
        if (cIdx === word.length) {
          deleting = true;
          setTimeout(type, 1800);
          return;
        }
      } else {
        el.textContent = word.slice(0, --cIdx);
        if (cIdx === 0) {
          deleting = false;
          wIdx = (wIdx + 1) % words.length;
        }
      }
      setTimeout(type, deleting ? 65 : 105);
    }

    setTimeout(type, 900);
  </script>
  <script type="module" src="chatbot.js"></script>
</body>
</html>
