<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="./assets/css/admin-login.css"/>
  <link rel="stylesheet" href="./assets/css/theme.css"/>
  <script src="./assets/js/theme.js"></script>
</head>
<body>

  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
      <div class="brand-text">
        <p class="brand-title">Portfolio Admin</p>
        <p class="brand-sub">Eka Danar Arrasyid</p>
      </div>
    </div>

    <!-- Title -->
    <h1 class="login-title">Selamat <span>Datang</span></h1>
    <p class="login-subtitle">Masuk ke panel admin portfolio kamu</p>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText">Email atau password salah.</span>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-envelope"></i>
        <input type="email" id="email" class="form-input" placeholder="admin@email.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-lock"></i>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin">
      <div class="spinner" id="spinner"></div>
      <i class="fas fa-right-to-bracket" id="loginIcon"></i>
      <span id="btnText">Masuk</span>
    </button>

    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Kembali ke Portfolio
    </a>

  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/js/admin-login.js"></script>
</body>
</html>
