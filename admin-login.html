<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --accent:   #0563bb;
      --heading:  #45505b;
      --text:     #272829;
      --bg:       #f4f7fb;
      --surface:  #ffffff;
      --border:   #e2e8f0;
      --font-nav: "Poppins", sans-serif;
      --font-h:   "Raleway", sans-serif;
      --font:     "Roboto", sans-serif;
      --error:    #e53e3e;
      --success:  #38a169;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(5,99,187,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(5,99,187,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Card ── */
    .login-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(5,99,187,0.1);
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.65s ease 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      box-shadow: 0 4px 14px rgba(5,99,187,0.3);
    }

    .brand-text {}

    .brand-title {
      font-family: var(--font-h);
      font-size: 16px;
      font-weight: 700;
      color: var(--heading);
      line-height: 1;
      margin-bottom: 2px;
    }

    .brand-sub {
      font-family: var(--font-nav);
      font-size: 11px;
      color: var(--text);
      opacity: 0.45;
      font-weight: 400;
    }

    /* Heading */
    .login-title {
      font-family: var(--font-h);
      font-size: 26px;
      font-weight: 800;
      color: var(--heading);
      margin-bottom: 6px;
    }

    .login-title span { color: var(--accent); }

    .login-subtitle {
      font-size: 14px;
      color: var(--text);
      opacity: 0.55;
      margin-bottom: 32px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: var(--font-nav);
      font-size: 12px;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 7px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%; transform: translateY(-50%);
      color: var(--heading);
      opacity: 0.35;
      font-size: 14px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(5,99,187,0.1);
    }

    .form-input::placeholder { opacity: 0.4; }

    /* Toggle password */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--heading);
      opacity: 0.35;
      font-size: 14px;
      transition: opacity 0.2s;
      padding: 0;
    }

    .toggle-pw:hover { opacity: 0.7; }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      font-family: var(--font-nav);
      font-size: 12px;
      font-weight: 500;
      color: var(--error);
      background: rgba(229,62,62,0.07);
      border: 1px solid rgba(229,62,62,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .error-msg.show { display: flex; }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-nav);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      margin-top: 4px;
    }

    .btn-login:hover {
      background: #0452a3;
      box-shadow: 0 6px 18px rgba(5,99,187,0.3);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Back to portfolio link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-family: var(--font-nav);
      font-size: 13px;
      color: var(--heading);
      opacity: 0.5;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
      <div class="brand-text">
        <p class="brand-title">Portfolio Admin</p>
        <p class="brand-sub">Eka Danar Arrasyid</p>
      </div>
    </div>

    <!-- Title -->
    <h1 class="login-title">Selamat <span>Datang</span></h1>
    <p class="login-subtitle">Masuk ke panel admin portfolio kamu</p>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText">Email atau password salah.</span>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-envelope"></i>
        <input type="email" id="email" class="form-input" placeholder="admin@email.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <i class="input-icon fas fa-lock"></i>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btnLogin">
      <div class="spinner" id="spinner"></div>
      <i class="fas fa-right-to-bracket" id="loginIcon"></i>
      <span id="btnText">Masuk</span>
    </button>

    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Kembali ke Portfolio
    </a>

  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── CONFIG — ganti dengan milik lo ──────────────────────
    const SUPABASE_URL     = 'https://vdnysjewpqunxokscaan.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkbnlzamV3cHF1bnhva3NjYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjQ2MDcsImV4cCI6MjA4OTUwMDYwN30.GfnHPRuO8bDdfTJeOhLAV0gw54_PDGojQCrVPTzSA3g';
    // ────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Kalau sudah login, langsung redirect ke dashboard
    db.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'admin.html';
    });

    // ── Toggle password visibility ───────────────────────────
    document.getElementById('togglePw').addEventListener('click', () => {
      const input   = document.getElementById('password');
      const icon    = document.getElementById('eyeIcon');
      const isHidden = input.type === 'password';
      input.type    = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // ── Login ────────────────────────────────────────────────
    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const errorTxt = document.getElementById('errorText');
      const btn      = document.getElementById('btnLogin');
      const spinner  = document.getElementById('spinner');
      const icon     = document.getElementById('loginIcon');
      const btnText  = document.getElementById('btnText');

      // Validasi
      if (!email || !password) {
        errorTxt.textContent = 'Email dan password wajib diisi.';
        errorMsg.classList.add('show');
        return;
      }

      // Loading state
      btn.disabled      = true;
      spinner.style.display = 'block';
      icon.style.display    = 'none';
      btnText.textContent   = 'Memproses...';
      errorMsg.classList.remove('show');

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errorTxt.textContent = 'Email atau password salah. Coba lagi.';
        errorMsg.classList.add('show');
        btn.disabled          = false;
        spinner.style.display = 'none';
        icon.style.display    = 'inline';
        btnText.textContent   = 'Masuk';
      } else {
        btnText.textContent = 'Berhasil! Mengalihkan...';
        setTimeout(() => window.location.href = 'admin.html', 800);
      }
    }

    document.getElementById('btnLogin').addEventListener('click', doLogin);

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
