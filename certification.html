<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="./assets/Title HTML.jpg"/>
  <title>Eka Danar Arrasyid — Certification</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font:"Roboto",system-ui,sans-serif; --heading-font:"Raleway",sans-serif; --nav-font:"Poppins",sans-serif;
      --background-color:#ffffff; --default-color:#272829; --heading-color:#45505b; --accent-color:#0563bb;
      --surface-color:#ffffff; --contrast-color:#ffffff; --nav-color:#45505b; --nav-hover-color:#0563bb; --nav-active-bg:#0563bb;
      --sidebar-width:72px; --sidebar-bg:#f8f9fa; --sidebar-border:#e9ecef; --nav-btn-size:46px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--default-font);background-color:var(--background-color);color:var(--default-color);min-height:100vh;display:flex}
    ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-thumb{background:rgba(5,99,187,0.2);border-radius:10px}

    /* ── SIDEBAR ── */
    #sidebar{position:fixed;top:0;left:0;width:var(--sidebar-width);height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;align-items:center;padding:28px 0;gap:10px;z-index:1000}
    .nav-btn{width:var(--nav-btn-size);height:var(--nav-btn-size);border-radius:50%;background:transparent;color:var(--nav-color);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .25s,color .25s,transform .2s;text-decoration:none;position:relative}
    .nav-btn:hover{background:rgba(5,99,187,0.1);color:var(--nav-hover-color);transform:scale(1.08)}
    .nav-btn.active{background:var(--nav-active-bg);color:var(--contrast-color);box-shadow:0 4px 14px rgba(5,99,187,0.35)}
    .nav-btn::after{content:attr(data-tooltip);position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);background:var(--heading-color);color:#fff;padding:5px 11px;border-radius:6px;font-family:var(--nav-font);font-size:12px;font-weight:500;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s}
    .nav-btn::before{content:'';position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--heading-color);opacity:0;pointer-events:none;transition:opacity .2s}
    .nav-btn:hover::after,.nav-btn:hover::before{opacity:1}

    /* ── MAIN CONTENT ── */
    #main-content{margin-left:var(--sidebar-width);flex:1;min-height:100vh;padding:60px 80px}

    /* ── PAGE HEADER ── */
    .page-header{margin-bottom:28px;opacity:0;transform:translateY(20px);animation:fadeUp .6s ease .1s forwards}
    .page-title{font-family:var(--heading-font);font-size:clamp(32px,4vw,52px);font-weight:700;color:var(--heading-color);margin-bottom:6px}
    .page-title span{color:var(--accent-color)}
    .page-subtitle{font-family:var(--nav-font);font-size:14px;color:var(--default-color);opacity:.5}

    /* ── STATS ── */
    .cert-stats{display:flex;gap:32px;margin-bottom:40px;flex-wrap:wrap;opacity:0;transform:translateY(14px);animation:fadeUp .6s ease .22s forwards}
    .stat-item{display:flex;flex-direction:column;gap:2px}
    .stat-number{font-family:var(--heading-font);font-size:28px;font-weight:800;color:var(--accent-color);line-height:1}
    .stat-label{font-family:var(--nav-font);font-size:11px;font-weight:500;color:var(--default-color);opacity:.5;text-transform:uppercase;letter-spacing:.8px}
    .stat-divider{width:1px;height:36px;background:var(--sidebar-border);align-self:center}

    /* ── CERT GRID ── */
    .cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
    .cert-card{background:var(--surface-color);border:1px solid var(--sidebar-border);border-radius:16px;overflow:hidden;opacity:0;transform:translateY(28px);transition:box-shadow .25s,transform .25s,border-color .25s}
    .cert-card:hover{box-shadow:0 10px 32px rgba(5,99,187,.11);transform:translateY(-5px);border-color:rgba(5,99,187,.18)}

    /* ── PREVIEW IMAGE ── */
    .cert-img-wrap{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f0f5fd,#dce9f8);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--sidebar-border);cursor:pointer}
    .cert-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .cert-card:hover .cert-img-wrap img{transform:scale(1.04)}

    .pdf-badge{position:absolute;top:10px;right:10px;background:#e53e3e;color:#fff;font-family:var(--nav-font);font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.5px;z-index:2;display:flex;align-items:center;gap:4px}

    .cert-zoom-overlay{position:absolute;inset:0;background:rgba(5,99,187,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;transition:opacity .22s;z-index:1}
    .cert-img-wrap:hover .cert-zoom-overlay{opacity:1}
    .cert-zoom-overlay i{font-size:22px;color:#fff}
    .cert-zoom-overlay span{font-family:var(--nav-font);font-size:12px;font-weight:600;color:#fff}
    .cert-zoom-overlay.pdf-overlay{background:rgba(229,62,62,.82)}

    .cert-img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;height:100%;padding:24px}
    .cert-frame{width:120px;height:84px;border:2px solid rgba(5,99,187,.18);border-radius:8px;background:rgba(5,99,187,.03);display:flex;align-items:center;justify-content:center;position:relative}
    .cert-frame::before{content:'';position:absolute;top:-2px;left:-2px;width:12px;height:12px;border-width:2px 0 0 2px;border-style:solid;border-color:var(--accent-color);opacity:.35;border-radius:3px 0 0 0}
    .cert-frame::after{content:'';position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-width:0 2px 2px 0;border-style:solid;border-color:var(--accent-color);opacity:.35;border-radius:0 0 3px 0}
    .cert-frame i{font-size:30px;color:var(--accent-color);opacity:.22}
    .cert-placeholder-label{font-family:var(--nav-font);font-size:11px;color:var(--accent-color);opacity:.42}

    /* ── CERT BODY ── */
    .cert-body{padding:18px 20px 20px}
    .cert-issuer-row{display:flex;align-items:center;gap:9px;margin-bottom:10px}
    .cert-issuer-icon{width:30px;height:30px;border-radius:8px;background:rgba(5,99,187,.08);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--accent-color);flex-shrink:0}
    .cert-issuer{font-family:var(--nav-font);font-size:11px;font-weight:700;color:var(--accent-color);letter-spacing:.6px;text-transform:uppercase}
    .cert-name{font-family:var(--heading-font);font-size:14px;font-weight:700;color:var(--heading-color);line-height:1.4;margin-bottom:14px}
    .cert-footer{display:flex;align-items:center;justify-content:space-between;padding-top:13px;border-top:1px solid var(--sidebar-border);gap:8px;flex-wrap:wrap}
    .cert-date{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--default-color);opacity:.5}
    .cert-date i{font-size:10px;color:var(--accent-color);opacity:.6}
    .cert-link{font-family:var(--nav-font);font-size:11px;font-weight:600;color:var(--accent-color);text-decoration:none;display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;border:1.5px solid rgba(5,99,187,.22);transition:all .2s}
    .cert-link:hover{background:var(--accent-color);border-color:var(--accent-color);color:#fff}

    /* ── LIGHTBOX ── */
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9999;align-items:center;justify-content:center;padding:24px}
    .lightbox.open{display:flex}
    .lightbox-inner{position:relative;max-width:800px;width:100%;animation:zoomIn .28s ease}
    @keyframes zoomIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
    .lightbox-inner img{width:100%;border-radius:12px;display:block}
    .lightbox-close{position:absolute;top:-14px;right:-14px;width:36px;height:36px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--heading-color);box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .2s}
    .lightbox-close:hover{transform:scale(1.12)}
    .lightbox-pdf-label{text-align:center;color:#fff;margin-top:16px;font-family:var(--nav-font);font-size:13px;opacity:.7}
    .lightbox-pdf-label a{color:#fff;font-weight:600;text-decoration:underline}

    /* ── STATE BOX ── */
    .state-box{text-align:center;padding:60px 24px;color:var(--heading-color);opacity:.45}
    .state-box i{font-size:36px;margin-bottom:12px;display:block}
    .state-box p{font-family:var(--nav-font);font-size:13px}
    .spin{animation:spinAnim .8s linear infinite}
    @keyframes spinAnim{to{transform:rotate(360deg)}}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

    /* ══════════════════════════════════════════════════════════
       HAMBURGER BUTTON
    ══════════════════════════════════════════════════════════ */
    #hamburger {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1100;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--accent-color);
      border: none;
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(5,99,187,.30);
      transition: background .2s, transform .2s;
    }
    #hamburger:hover { background: #0452a0; transform: scale(1.05); }
    #hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transform-origin: center;
      transition: transform .28s cubic-bezier(.4,0,.2,1), opacity .2s ease, width .2s ease;
    }
    #hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
    #hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ══════════════════════════════════════════════════════════
       BACKDROP
    ══════════════════════════════════════════════════════════ */
    #nav-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(39,40,41,.45);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  opacity: 0;
  transition: opacity .28s ease;
  pointer-events: none; /* ← TAMBAH INI */
}
#nav-backdrop.visible {
  opacity: 1;
  pointer-events: auto; /* ← TAMBAH INI */
}

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE MOBILE
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* CSS variable reset */
      :root { --sidebar-width: 0px; }

      /* Hamburger & backdrop tampil */
      #hamburger { display: flex; }
      #nav-backdrop { display: block; }

      /* Sidebar slide dari kiri */
      #sidebar {
        position: fixed;
        top: 0; left: 0;
        width: 220px;
        height: 100vh;
        flex-direction: column;
        align-items: flex-start;
        padding: 80px 16px 32px;
        gap: 6px;
        border-right: 1px solid var(--sidebar-border);
        border-top: none;
        transform: translateX(-100%);
        transition: transform .32s cubic-bezier(.4,0,.2,1), box-shadow .32s ease;
        box-shadow: none;
        z-index: 1000;
      }
      #sidebar.open {
        transform: translateX(0);
        box-shadow: 6px 0 32px rgba(5,99,187,.14);
      }

      /* Nav btn: full width dengan label */
      #sidebar .nav-btn {
        width: 100%;
        height: 46px;
        border-radius: 10px;
        justify-content: flex-start;
        padding: 0 14px;
        gap: 12px;
        font-size: 15px;
      }
      #sidebar .nav-btn::after {
        position: static;
        transform: none;
        background: transparent;
        color: inherit;
        padding: 0;
        border-radius: 0;
        font-size: 13px;
        font-weight: 500;
        opacity: 1;
        pointer-events: auto;
        content: attr(data-tooltip);
        white-space: nowrap;
      }
      #sidebar .nav-btn::before { display: none; }

      /* Main content — full width, padding top untuk clearance hamburger */
      #main-content {
        margin-left: 0;
        margin-bottom: 0;
        padding: 72px 20px 40px;
      }

      /* Page header */
      .page-header { margin-bottom: 20px; }
      .page-title { font-size: clamp(28px, 8vw, 36px); }

      /* Stats — lebih compact di mobile */
      .cert-stats {
        gap: 20px;
        margin-bottom: 24px;
        padding: 16px 20px;
        background: rgba(5,99,187,.03);
        border: 1px solid var(--sidebar-border);
        border-radius: 14px;
      }
      .stat-number { font-size: 22px; }
      .stat-label  { font-size: 10px; }
      .stat-divider { height: 28px; }

      /* Grid — 1 kolom di mobile, 2 kolom di tablet kecil */
      .cert-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      /* Card mobile: horizontal layout (gambar kiri, info kanan) */
      .cert-card {
        display: grid;
        grid-template-columns: 120px 1fr;
        border-radius: 14px;
      }
      .cert-card:hover { transform: translateY(-2px); } /* subtle hover di mobile */

      /* Gambar kiri — portrait, full height card */
      .cert-img-wrap {
        aspect-ratio: unset;
        height: 100%;
        min-height: 130px;
        border-bottom: none;
        border-right: 1px solid var(--sidebar-border);
        border-radius: 14px 0 0 14px;
      }

      /* PDF badge lebih kecil di mobile */
      .pdf-badge { font-size: 9px; padding: 2px 7px; top: 8px; right: 8px; }

      /* Body kanan */
      .cert-body {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .cert-issuer-row { margin-bottom: 6px; gap: 7px; }
      .cert-issuer-icon { width: 26px; height: 26px; font-size: 11px; }
      .cert-issuer      { font-size: 10px; }
      .cert-name        { font-size: 13px; margin-bottom: 10px; line-height: 1.35; }

      .cert-footer {
        flex-direction: row;
        align-items: center;
        padding-top: 10px;
        gap: 8px;
      }
      .cert-date  { font-size: 11px; }
      .cert-link  { font-size: 10px; padding: 4px 10px; }

      /* Placeholder di layout horizontal */
      .cert-img-placeholder { padding: 16px; }
      .cert-frame { width: 80px; height: 56px; }
      .cert-frame i { font-size: 20px; }

      /* Lightbox di mobile: fullscreen hampir */
      .lightbox { padding: 16px; }
      .lightbox-inner { max-width: 100%; }
      .lightbox-close { top: -12px; right: -8px; width: 32px; height: 32px; font-size: 14px; }
    }

    /* Tablet kecil: 2 kolom grid tapi tetap card vertikal */
    @media (min-width: 480px) and (max-width: 768px) {
      .cert-grid {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      /* Balik ke layout vertikal untuk 2 kolom */
      .cert-card {
        display: block;
      }
      .cert-img-wrap {
        aspect-ratio: 4/3;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--sidebar-border);
        border-radius: 14px 14px 0 0;
      }
      .cert-body {
        display: block;
        padding: 14px 16px;
      }
    }
  </style>
</head>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil"><i class="fas fa-user"></i></a>
    <a href="skills.html"        class="nav-btn" data-tooltip="Skills"><i class="fas fa-list-check"></i></a>
    <a href="experience.html"    class="nav-btn" data-tooltip="Experience"><i class="fas fa-briefcase"></i></a>
    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn active" data-tooltip="Certification"><i class="fas fa-award"></i></a>
    <a href="portfolio.html"     class="nav-btn" data-tooltip="Portfolio"><i class="fas fa-briefcase-clock"></i></a>
  </nav>

  <button id="hamburger" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div id="nav-backdrop"></div>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Certifi<span>cation</span></h1>
      <p class="page-subtitle">Sertifikasi & penghargaan yang diraih</p>
    </div>

    <div class="cert-stats">
      <div class="stat-item">
        <span class="stat-number" id="statTotal">—</span>
        <span class="stat-label">Total Sertifikat</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number" id="statIssuer">—</span>
        <span class="stat-label">Issuer</span>
      </div>
    </div>

    <div class="cert-grid" id="certGrid">
      <div class="state-box" style="grid-column:1/-1">
        <i class="fas fa-circle-notch spin"></i>
        <p>Memuat data...</p>
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose"><i class="fas fa-times"></i></button>
      <img src="" alt="Sertifikat" id="lightboxImg"/>
      <p class="lightbox-pdf-label" id="lightboxPdfLabel" style="display:none">
        Ini adalah tampilan preview.
        <a href="#" id="lightboxPdfLink" target="_blank">Buka file PDF asli</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';

    function isPDF(url) { return url && url.toLowerCase().includes('.pdf'); }

    function openLightbox(thumbnailUrl, originalUrl) {
      const isFilePDF = isPDF(originalUrl);
      document.getElementById('lightboxImg').src = thumbnailUrl;
      const pdfLabel = document.getElementById('lightboxPdfLabel');
      const pdfLink  = document.getElementById('lightboxPdfLink');
      if (isFilePDF && originalUrl) {
        pdfLabel.style.display = 'block';
        pdfLink.href = originalUrl;
      } else {
        pdfLabel.style.display = 'none';
      }
      document.getElementById('lightbox').classList.add('open');
    }

    async function loadCertifications() {
      const grid = document.getElementById('certGrid');
      const { data, error } = await supabase
        .from('certifications')
        .select('*')
        .order('sort_order');

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data.</p></div>`;
        return;
      }

      document.getElementById('statTotal').textContent  = data.length;
      document.getElementById('statIssuer').textContent = new Set(data.map(c => c.issuer)).size;

      let delay = 0.3;
      grid.innerHTML = data.map(c => {
        const displayImg  = c.thumbnail_url || (c.image_url && !isPDF(c.image_url) ? c.image_url : null);
        const originalUrl = c.image_url;
        const isFilePDF   = isPDF(originalUrl);

        const previewArea = displayImg
          ? `<div class="cert-img-wrap"
               data-thumbnail="${displayImg}"
               data-original="${originalUrl || ''}"
               data-is-pdf="${isFilePDF}">
               <img src="${displayImg}" alt="${c.cert_name}" loading="lazy">
               ${isFilePDF ? `<span class="pdf-badge"><i class="fas fa-file-pdf"></i> PDF</span>` : ''}
               <div class="cert-zoom-overlay ${isFilePDF ? 'pdf-overlay' : ''}">
                 <i class="fas fa-magnifying-glass-plus"></i>
                 <span>${isFilePDF ? 'Lihat Preview' : 'Lihat Sertifikat'}</span>
               </div>
             </div>`
          : `<div class="cert-img-wrap" style="cursor:default">
               <div class="cert-img-placeholder">
                 <div class="cert-frame"><i class="fas fa-certificate"></i></div>
                 <span class="cert-placeholder-label">Belum ada file</span>
               </div>
             </div>`;

        const d = delay; delay += 0.1;
        return `
          <div class="cert-card" style="animation:fadeUp .55s ease ${d}s forwards">
            ${previewArea}
            <div class="cert-body">
              <div class="cert-issuer-row">
                <div class="cert-issuer-icon"><i class="${c.issuer_icon || 'fas fa-building'}"></i></div>
                <span class="cert-issuer">${c.issuer}</span>
              </div>
              <p class="cert-name">${c.cert_name}</p>
              <div class="cert-footer">
                <span class="cert-date"><i class="fas fa-calendar"></i> ${c.issued_date || '—'}</span>
                ${c.cert_url ? `<a href="${c.cert_url}" target="_blank" class="cert-link"><i class="fas fa-arrow-up-right-from-square"></i> Verifikasi</a>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      document.querySelectorAll('.cert-img-wrap[data-thumbnail]').forEach(wrap => {
        wrap.addEventListener('click', () => {
          openLightbox(wrap.dataset.thumbnail, wrap.dataset.original);
        });
      });
    }

    document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
    });

    loadCertifications();
  </script>

  <script type="module" src="chatbot.js"></script>

  <script>
  (function() {
    const hamburger = document.getElementById('hamburger');
    const sidebar   = document.getElementById('sidebar');
    const backdrop  = document.getElementById('nav-backdrop');
    if (!hamburger || !sidebar || !backdrop) return;

    function openMenu() {
      sidebar.classList.add('open');
      backdrop.classList.add('visible');
      hamburger.classList.add('open');
      hamburger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      sidebar.classList.remove('open');
      backdrop.classList.remove('visible');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeMenu() : openMenu();
    });

    backdrop.addEventListener('click', closeMenu);

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) closeMenu();
    });
  })();
  </script>

</body>
</html>
