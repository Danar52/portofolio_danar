<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="./assets/Title HTML.jpg"/>
  <title>Eka Danar Arrasyid — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Poppins:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --default-font: "Roboto", system-ui, sans-serif;
      --heading-font: "Raleway", sans-serif;
      --nav-font: "Poppins", sans-serif;
      --background-color: #ffffff;
      --default-color: #272829;
      --heading-color: #45505b;
      --accent-color: #0563bb;
      --surface-color: #ffffff;
      --contrast-color: #ffffff;
      --nav-color: #45505b;
      --nav-hover-color: #0563bb;
      --nav-active-bg: #0563bb;
      --sidebar-width: 72px;
      --sidebar-bg: #f8f9fa;
      --sidebar-border: #e9ecef;
      --nav-btn-size: 46px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--default-font); background-color: var(--background-color); color: var(--default-color); min-height: 100vh; display: flex; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(5,99,187,0.2); border-radius: 10px; }

    /* ── SIDEBAR ── */
    #sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; align-items: center; padding: 28px 0; gap: 10px; z-index: 1000; }
    .nav-btn { width: var(--nav-btn-size); height: var(--nav-btn-size); border-radius: 50%; background: transparent; color: var(--nav-color); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.25s, color 0.25s, transform 0.2s; text-decoration: none; position: relative; }
    .nav-btn:hover { background: rgba(5,99,187,0.1); color: var(--nav-hover-color); transform: scale(1.08); }
    .nav-btn.active { background: var(--nav-active-bg); color: var(--contrast-color); box-shadow: 0 4px 14px rgba(5,99,187,0.35); }
    .nav-btn::after { content: attr(data-tooltip); position: absolute; left: calc(100% + 14px); top: 50%; transform: translateY(-50%); background: var(--heading-color); color: #fff; padding: 5px 11px; border-radius: 6px; font-family: var(--nav-font); font-size: 12px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn::before { content: ''; position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%); border: 5px solid transparent; border-right-color: var(--heading-color); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-btn:hover::after, .nav-btn:hover::before { opacity: 1; }

    /* ── MAIN ── */
    #main-content { margin-left: var(--sidebar-width); flex: 1; min-height: 100vh; padding: 60px 80px; }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 40px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.1s forwards; }
    .page-title { font-family: var(--heading-font); font-size: clamp(32px,4vw,52px); font-weight: 700; color: var(--heading-color); margin-bottom: 6px; }
    .page-title span { color: var(--accent-color); }
    .page-subtitle { font-family: var(--nav-font); font-size: 14px; color: var(--default-color); opacity: 0.5; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 36px;
      opacity: 0; transform: translateY(16px); animation: fadeUp 0.6s ease 0.2s forwards;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 20px;
      font-family: var(--nav-font); font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--sidebar-border);
      background: transparent; color: var(--heading-color);
      cursor: pointer; transition: all 0.22s;
    }
    .filter-btn i { font-size: 11px; }
    .filter-btn:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(5,99,187,0.05); }
    .filter-btn.active { background: var(--accent-color); border-color: var(--accent-color); color: #fff; box-shadow: 0 4px 12px rgba(5,99,187,0.3); }

    /* ── PORTFOLIO GRID ── */
    .portfolio-grid {
      columns: 3; column-gap: 24px;
      opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s ease 0.3s forwards;
    }

    /* ── PORTFOLIO CARD ── */
    .portfolio-card {
      break-inside: avoid;
      margin-bottom: 24px;
      border: 1px solid var(--sidebar-border);
      border-radius: 16px;
      background: var(--surface-color);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .portfolio-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(5,99,187,0.13); }
    .portfolio-card.hidden { display: none; }

    /* Thumbnail */
    .card-thumb {
      position: relative; width: 100%; overflow: hidden;
      background: linear-gradient(135deg, #e8f0fb, #c5d8f5);
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .portfolio-card:hover .card-thumb img { transform: scale(1.04); }

    /* Placeholder thumb */
    .thumb-placeholder {
      width: 100%; aspect-ratio: 16/9;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; background: linear-gradient(135deg, #e8f0fb, #c5d8f5);
    }
    .thumb-placeholder i { font-size: 32px; color: var(--accent-color); opacity: 0.4; }
    .thumb-placeholder span { font-family: var(--nav-font); font-size: 10px; font-weight: 600; color: var(--accent-color); opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }

    /* Microlink auto-screenshot thumb */
    .thumb-microlink {
      width: 100%; aspect-ratio: 16/9; position: relative;
      background: linear-gradient(135deg, #e8f0fb, #c5d8f5);
      overflow: hidden;
    }
    .thumb-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-loading i { font-size: 22px; color: var(--accent-color); opacity: 0.45; }
    .thumb-ml-img { width: 100%; height: 100%; object-fit: cover; }

    /* Badge overlay */
    .card-badge {
      position: absolute; top: 12px; left: 12px;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-family: var(--nav-font); font-size: 10px; font-weight: 700;
      backdrop-filter: blur(8px); letter-spacing: 0.5px;
    }
    .badge-design   { background: rgba(5,99,187,0.85);  color: #fff; }
    .badge-web      { background: rgba(13,155,121,0.85); color: #fff; }
    .badge-ui       { background: rgba(138,43,226,0.85); color: #fff; }
    .badge-branding { background: rgba(229,114,0,0.85);  color: #fff; }
    .badge-motion   { background: rgba(220,38,38,0.85);  color: #fff; }
    .badge-other    { background: rgba(69,80,91,0.75);   color: #fff; }

    /* Card body */
    .card-body { padding: 18px 20px 20px; }
    .card-title {
      font-family: var(--heading-font); font-size: 15px; font-weight: 700;
      color: var(--heading-color); margin-bottom: 6px; line-height: 1.35;
    }
    .card-desc {
      font-size: 12px; line-height: 1.65; color: var(--default-color);
      opacity: 0.6; margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .card-tag {
      font-family: var(--nav-font); font-size: 10px; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      background: rgba(5,99,187,0.07); color: var(--accent-color);
    }
    .card-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--nav-font); font-size: 11px; font-weight: 600;
      color: var(--accent-color); text-decoration: none;
      opacity: 0; transform: translateX(-4px); transition: opacity 0.2s, transform 0.2s;
    }
    .portfolio-card:hover .card-link { opacity: 1; transform: translateX(0); }
    .card-link i { font-size: 10px; }

    /* ── FEATURED CARD (span 2 col via wide class, only for masonry trick) ── */
    .portfolio-card.featured .card-thumb { aspect-ratio: 16/7; }
    .portfolio-card:not(.featured) .card-thumb { aspect-ratio: 16/10; }

    /* ── EMPTY / LOADING STATE ── */
    .state-box { text-align: center; padding: 80px 24px; color: var(--heading-color); opacity: 0.4; }
    .state-box i { font-size: 42px; margin-bottom: 14px; display: block; }
    .state-box p { font-family: var(--nav-font); font-size: 14px; }
    .spin { animation: spinAnim 0.8s linear infinite; }

    /* ── LIGHTBOX ── */
    .lightbox-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .lightbox-overlay.open { display: flex; }
    .lightbox-box {
      background: #fff; border-radius: 20px; width: 100%; max-width: 800px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.25);
      animation: lbIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes lbIn { from { transform: scale(0.88) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
    .lightbox-img {
      width: 100%; max-height: 420px; object-fit: cover;
      border-radius: 20px 20px 0 0;
    }
    .lightbox-img-placeholder {
      width: 100%; height: 240px; border-radius: 20px 20px 0 0;
      background: linear-gradient(135deg, #e8f0fb, #c5d8f5);
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-img-placeholder i { font-size: 48px; color: var(--accent-color); opacity: 0.3; }
    .lightbox-body { padding: 28px 32px 32px; }
    .lightbox-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .lightbox-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-family: var(--nav-font); font-size: 11px; font-weight: 700; }
    .lightbox-date { font-family: var(--nav-font); font-size: 11px; color: var(--heading-color); opacity: 0.45; margin-left: auto; }
    .lightbox-title { font-family: var(--heading-font); font-size: 24px; font-weight: 800; color: var(--heading-color); margin-bottom: 12px; line-height: 1.25; }
    .lightbox-desc { font-size: 14px; line-height: 1.8; color: var(--default-color); opacity: 0.75; margin-bottom: 20px; }
    .lightbox-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .lightbox-tag { font-family: var(--nav-font); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: rgba(5,99,187,0.07); color: var(--accent-color); }
    .lightbox-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .lb-btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 10px; font-family: var(--nav-font); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; border: none; }
    .lb-btn-primary { background: var(--accent-color); color: #fff; box-shadow: 0 3px 10px rgba(5,99,187,0.25); }
    .lb-btn-primary:hover { background: #0452a3; transform: translateY(-1px); }
    .lb-btn-outline { background: transparent; color: var(--heading-color); border: 1.5px solid var(--sidebar-border); }
    .lb-btn-outline:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(5,99,187,0.05); }
    .lightbox-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--heading-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: background 0.2s;
    }
    .lightbox-close:hover { background: #fff; }
    .lightbox-overlay { position: fixed; }
    .lightbox-box { position: relative; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes spinAnim { to { transform: rotate(360deg); } }

    /* ── HAMBURGER BUTTON ─────────────────────────────────────── */
#hamburger {
  display: none; /* hidden di desktop */
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 1100;
  width: 42px;
  height: 42px;
  border-radius: 10px;
  background: var(--accent-color);
  border: none;
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 10px;
  box-shadow: 0 4px 16px rgba(5, 99, 187, 0.30);
  transition: background 0.2s, transform 0.2s;
}
#hamburger:hover {
  background: #0452a0;
  transform: scale(1.05);
}
#hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
  transform-origin: center;
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
              opacity   0.2s ease,
              width     0.2s ease;
}
 
/* Hamburger → X saat open */
#hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
#hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
#hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
 
 
/* ── BACKDROP OVERLAY ─────────────────────────────────────── */
#nav-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(39, 40, 41, 0.45);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  opacity: 0;
  transition: opacity 0.28s ease;
}
#nav-backdrop.visible {
  opacity: 1;
}
 
 
/* ── RESPONSIVE — MOBILE ──────────────────────────────────── */
@media (max-width: 768px) {

  /* Chibi — tetap tampilan lama */
  .home-hero {
    grid-template-columns: 1fr;
    padding: 72px 24px 32px; /* ← ganti padding biar clearance hamburger */
    justify-items: center;
    text-align: center;
  }
  .hero-text   { align-items: center; }
  .chibi-stage { width: 100%; height: 360px; overflow: hidden; }
  .chibi-img   { height: 340px; max-height: 340px; min-height: 340px; }
 
  /* Hamburger button muncul */
  #hamburger {
    display: flex;
  }
 
  /* Backdrop aktif saat sidebar open */
  #nav-backdrop {
    display: block;
  }
 
  /* Reset sidebar width — tidak ada reserved space di kiri */
  :root {
    --sidebar-width: 0px;
  }
 
  /* Sidebar: pindah ke luar viewport kiri, slide masuk saat open */
  #sidebar {
    /* Override semua layout desktop */
    position: fixed;
    top: 0;
    left: 0;
    width: 220px;
    height: 100vh;
    flex-direction: column;
    align-items: flex-start;
    padding: 80px 16px 32px;
    gap: 6px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    border-top: none;
 
    /* Tersembunyi di kiri, slide masuk saat .open */
    transform: translateX(-100%);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.32s ease;
    box-shadow: none;
    z-index: 1000;
  }
 
  #sidebar.open {
    transform: translateX(0);
    box-shadow: 6px 0 32px rgba(5, 99, 187, 0.14);
  }
 
  /* Nav button di mobile: lebar penuh, rounded, dengan label teks */
  #sidebar .nav-btn {
    width: 100%;
    height: 46px;
    border-radius: 10px;
    justify-content: flex-start;
    padding: 0 14px;
    gap: 12px;
    font-size: 15px;
  }
 
  /* Tampilkan label tooltip sebagai teks inline di mobile */
  #sidebar .nav-btn::after {
    /* Override tooltip positioning — jadikan inline text */
    position: static;
    transform: none;
    background: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: 13px;
    font-weight: 500;
    opacity: 1;
    pointer-events: auto;
    content: attr(data-tooltip);
    white-space: nowrap;
  }
 
  /* Sembunyikan arrow tooltip */
  #sidebar .nav-btn::before {
    display: none;
  }
 
  /* Main content tidak perlu margin bottom lagi */
  #main-content {
    margin-left: 0;
    margin-bottom: 0;
  }
 
  /* Padding hero di mobile */
  .home-hero {
    padding: 72px 24px 32px; /* top lebih tinggi untuk clearance hamburger */
  }
}
  </style>
</head>
<body>

  <nav id="sidebar">
    <a href="index.html"         class="nav-btn" data-tooltip="Home"><i class="fas fa-house"></i></a>
    <a href="profil.html"        class="nav-btn" data-tooltip="Profil"><i class="fas fa-user"></i></a>

    <a href="event.html"         class="nav-btn" data-tooltip="Event / Organization"><i class="fas fa-calendar-days"></i></a>
    <a href="certification.html" class="nav-btn" data-tooltip="Certification"><i class="fas fa-award"></i></a>
    <a href="portfolio.html"     class="nav-btn active" data-tooltip="Portfolio"><i class="fas fa-briefcase-clock"></i></a>
  </nav>

  <button id="hamburger" aria-label="Menu" aria-expanded="false">
  <span></span><span></span><span></span>
</button>
<div id="nav-backdrop"></div>

  <main id="main-content">
    <div class="page-header">
      <h1 class="page-title">Porto<span>folio</span></h1>
      <p class="page-subtitle">Kumpulan karya &amp; project gw</p>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all"><i class="fas fa-border-all"></i> Semua</button>
      <button class="filter-btn" data-filter="web"><i class="fas fa-code"></i> Web Dev</button>
      <button class="filter-btn" data-filter="design"><i class="fas fa-pen-ruler"></i> Design</button>
      <!-- <button class="filter-btn" data-filter="ui"><i class="fas fa-mobile-screen"></i> UI/UX</button>
      <button class="filter-btn" data-filter="branding"><i class="fas fa-palette"></i> Branding</button>
      <button class="filter-btn" data-filter="motion"><i class="fas fa-film"></i> Motion</button> -->
      <button class="filter-btn" data-filter="other"><i class="fas fa-box-open"></i> Lainnya</button>
    </div>

    <div id="portfolioContent">
      <div class="state-box"><i class="fas fa-circle-notch spin"></i></div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightboxOverlay">
    <div class="lightbox-box" id="lightboxBox">
      <button class="lightbox-close" id="lightboxClose"><i class="fas fa-times"></i></button>
      <div id="lightboxContent"></div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';

    const TYPE_CONFIG = {
      web:      { label: 'Web Dev',   icon: 'fas fa-code',          cls: 'badge-web'      },
      design:   { label: 'Design',    icon: 'fas fa-pen-ruler',     cls: 'badge-design'   },
    //   ui:       { label: 'UI/UX',     icon: 'fas fa-mobile-screen', cls: 'badge-ui'       },
    //   branding: { label: 'Branding',  icon: 'fas fa-palette',       cls: 'badge-branding' },
    //   motion:   { label: 'Motion',    icon: 'fas fa-film',          cls: 'badge-motion'   },
      other:    { label: 'Lainnya',   icon: 'fas fa-box-open',      cls: 'badge-other'    },
    };

    let allItems = [];

    // ── HELPER: resolve thumbnail src ──
    // Priority: thumbnail_url (manual) → Microlink screenshot (dari url_live) → placeholder
    function getThumbSrc(item) {
      if (item.thumbnail_url) return { type: 'img', src: item.thumbnail_url };
      if (item.url_live)      return { type: 'microlink', url: item.url_live };
      return { type: 'placeholder' };
    }

    function buildThumbHtml(item, cfg) {
      const t = getThumbSrc(item);
      if (t.type === 'img') {
        return `<img src="${t.src}" alt="${item.title}" loading="lazy">`;
      }
      if (t.type === 'microlink') {
        // Microlink screenshot embed — loading state dulu, lalu swap ke img
        const encoded = encodeURIComponent(t.url);
        return `
          <div class="thumb-microlink" data-url="${encoded}">
            <div class="thumb-loading">
              <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <img class="thumb-ml-img" style="display:none" alt="${item.title}" loading="lazy">
          </div>`;
      }
      return `<div class="thumb-placeholder"><i class="${cfg.icon}"></i><span>${cfg.label}</span></div>`;
    }

    async function loadPortfolio() {
      const el = document.getElementById('portfolioContent');
      const { data, error } = await supabase
        .from('portfolio')
        .select('*')
        .eq('is_published', true)
        .order('sort_order')
        .order('created_at', { ascending: false });

      if (error) {
        el.innerHTML = `<div class="state-box"><i class="fas fa-triangle-exclamation"></i><p>Gagal memuat data.</p></div>`;
        return;
      }

      if (!data || data.length === 0) {
        el.innerHTML = `<div class="state-box"><i class="fas fa-folder-open"></i><p>Belum ada karya yang dipublikasikan.</p></div>`;
        return;
      }

      allItems = data;
      renderGrid(data);
    }

    function renderGrid(items) {
      const el = document.getElementById('portfolioContent');
      if (items.length === 0) {
        el.innerHTML = `<div class="state-box"><i class="fas fa-filter"></i><p>Tidak ada item di kategori ini.</p></div>`;
        return;
      }

      const cardsHtml = items.map((item, idx) => {
        const cfg = TYPE_CONFIG[item.type] || TYPE_CONFIG.other;
        const isFeatured = item.is_featured ? 'featured' : '';

        const thumbHtml = buildThumbHtml(item, cfg);

        const tagsArr = item.tags || [];
        const tagsHtml = tagsArr.slice(0,3).map(t => `<span class="card-tag">${t}</span>`).join('');

        return `
          <div class="portfolio-card ${isFeatured}" data-type="${item.type}" data-id="${item.id}"
            style="opacity:0;transform:translateY(20px);animation:fadeUp 0.5s ease ${0.05 * idx + 0.3}s forwards">
            <div class="card-thumb">
              ${thumbHtml}
              <span class="card-badge ${cfg.cls}"><i class="${cfg.icon}"></i>${cfg.label}</span>
            </div>
            <div class="card-body">
              <p class="card-title">${item.title}</p>
              <p class="card-desc">${item.description || ''}</p>
              <div class="card-footer">
                <div class="card-tags">${tagsHtml}</div>
                <span class="card-link"><i class="fas fa-arrow-right"></i> Lihat detail</span>
              </div>
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `<div class="portfolio-grid">${cardsHtml}</div>`;

      // Bind click → lightbox
      document.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          const item = allItems.find(i => i.id === id);
          if (item) openLightbox(item);
        });
      });

      // ── Load Microlink screenshots ──
      document.querySelectorAll('.thumb-microlink').forEach(wrap => {
        const encoded = wrap.dataset.url;
        const img = wrap.querySelector('.thumb-ml-img');
        const loading = wrap.querySelector('.thumb-loading');
        const mlSrc = `https://api.microlink.io/?url=${encoded}&screenshot=true&meta=false&embed=screenshot.url`;
        img.src = mlSrc;
        img.onload = () => {
          loading.style.display = 'none';
          img.style.display = 'block';
        };
        img.onerror = () => {
          // Fallback ke placeholder kalau Microlink gagal
          loading.innerHTML = '<i class="fas fa-globe" style="font-size:28px;color:var(--accent-color);opacity:.3"></i>';
        };
      });
    }

    // ── FILTER ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        const filtered = filter === 'all' ? allItems : allItems.filter(i => i.type === filter);
        renderGrid(filtered);
      });
    });

    // ── LIGHTBOX ──
    function openLightbox(item) {
      const cfg = TYPE_CONFIG[item.type] || TYPE_CONFIG.other;
      const tagsArr = item.tags || [];
      const tagsHtml = tagsArr.map(t => `<span class="lightbox-tag">${t}</span>`).join('');

      // Resolve gambar untuk lightbox — sama kayak card
      let imgHtml;
      if (item.thumbnail_url) {
        imgHtml = `<img class="lightbox-img" src="${item.thumbnail_url}" alt="${item.title}">`;
      } else if (item.url_live) {
        const encoded = encodeURIComponent(item.url_live);
        const mlSrc = `https://api.microlink.io/?url=${encoded}&screenshot=true&meta=false&embed=screenshot.url`;
        imgHtml = `
          <div style="position:relative;width:100%;background:linear-gradient(135deg,#e8f0fb,#c5d8f5);border-radius:20px 20px 0 0;min-height:200px;display:flex;align-items:center;justify-content:center" id="lbThumbWrap">
            <i class="fas fa-circle-notch fa-spin" style="font-size:28px;color:var(--accent-color);opacity:.5" id="lbThumbSpin"></i>
            <img class="lightbox-img" id="lbThumbImg" src="${mlSrc}" alt="${item.title}" style="display:none"
              onload="document.getElementById('lbThumbSpin').style.display='none';this.style.display='block'"
              onerror="document.getElementById('lbThumbWrap').style.minHeight='80px';document.getElementById('lbThumbSpin').style.display='none'">
          </div>`;
      } else {
        imgHtml = `<div class="lightbox-img-placeholder"><i class="${cfg.icon}"></i></div>`;
      }

      const actionLinks = [];
      if (item.url_live)    actionLinks.push(`<a href="${item.url_live}" target="_blank" class="lb-btn lb-btn-primary"><i class="fas fa-external-link-alt"></i> Lihat Live</a>`);
      if (item.url_github)  actionLinks.push(`<a href="${item.url_github}" target="_blank" class="lb-btn lb-btn-outline"><i class="fab fa-github"></i> GitHub</a>`);
      if (item.url_behance) actionLinks.push(`<a href="${item.url_behance}" target="_blank" class="lb-btn lb-btn-outline"><i class="fab fa-behance"></i> Behance</a>`);
      if (item.url_figma)   actionLinks.push(`<a href="${item.url_figma}" target="_blank" class="lb-btn lb-btn-outline"><i class="fab fa-figma"></i> Figma</a>`);

      document.getElementById('lightboxContent').innerHTML = `
        ${imgHtml}
        <div class="lightbox-body">
          <div class="lightbox-meta">
            <span class="lightbox-badge ${cfg.cls}"><i class="${cfg.icon}"></i> ${cfg.label}</span>
            ${item.year ? `<span class="lightbox-date">${item.year}</span>` : ''}
          </div>
          <h2 class="lightbox-title">${item.title}</h2>
          <p class="lightbox-desc">${item.description || ''}</p>
          ${tagsHtml ? `<div class="lightbox-tags">${tagsHtml}</div>` : ''}
          ${actionLinks.length ? `<div class="lightbox-actions">${actionLinks.join('')}</div>` : ''}
        </div>`;

      document.getElementById('lightboxOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightboxOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('lightboxOverlay')) closeLightbox();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    loadPortfolio();
  </script>
  <script type="module" src="chatbot.js"></script>
  <script>
(function() {
  const hamburger = document.getElementById('hamburger');
  const sidebar   = document.getElementById('sidebar');
  const backdrop  = document.getElementById('nav-backdrop');
  if (!hamburger || !sidebar || !backdrop) return;

  function openMenu() {
    sidebar.classList.add('open');
    backdrop.classList.add('visible');
    hamburger.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {
    sidebar.classList.remove('open');
    backdrop.classList.remove('visible');
    hamburger.classList.remove('open');
    hamburger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  hamburger.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeMenu() : openMenu();
  });

  backdrop.addEventListener('click', closeMenu);

  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) closeMenu();
  });
})();
</script>
